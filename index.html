<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>NASTA Pro - Puhdas Kartta</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <style>
        body, html { margin:0; padding:0; height:100vh; width:100vw; overflow:hidden; background:#000; }
        #map { height: 100vh; width: 100vw; }

        /* HUD:it kartan päällä - ei listoja */
        .hud { position: absolute; z-index: 1000; }
        .top-left { top: 20px; left: 20px; width: 300px; display: flex; flex-direction: column; gap: 10px; }
        
        .bottom-bar { 
            bottom: 0; left: 0; width: 100%; height: 100px; 
            background: rgba(0,0,0,0.9); border-top: 3px solid #fff;
            display: flex; align-items: center; padding: 0 40px; color: white;
            font-size: 2.5rem; font-weight: bold;
        }
        
        button { height: 50px; cursor: pointer; border: none; font-weight: bold; }
        .nav-btn { background: #000; color: #fff; }
        .stop-btn { background: #c62828; color: #fff; display: none; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="hud top-left">
        <button id="start-btn" class="nav-btn" onclick="aloita()">NAVIGOI KOHTEESEEN</button>
        <button id="stop-btn" class="stop-btn" onclick="lopeta()">LOPETA</button>
    </div>

    <div class="hud bottom-bar" id="hud-text">VALMIUSTILASSA</div>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([60.392, 25.666], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let control = L.Routing.control({
            waypoints: [],
            router: L.Routing.osrmv1({ profile: 'car' }),
            createMarker: () => null,
            lineOptions: { styles: [{ color: '#00ccff', opacity: 0.8, weight: 8 }] }
        }).addTo(map);

        function aloita() {
            control.setWaypoints([L.latLng(60.392, 25.666), L.latLng(60.400, 25.670)]);
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('stop-btn').style.display = 'block';
            document.getElementById('hud-text').innerText = "VT7 -> KÄÄNNY OIKEALLE 500M";
        }

        function lopeta() {
            control.setWaypoints([]);
            document.getElementById('start-btn').style.display = 'block';
            document.getElementById('stop-btn').style.display = 'none';
            document.getElementById('hud-text').innerText = "VALMIUSTILASSA";
        }
    </script>
</body>
</html>
