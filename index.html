<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NASTA Pro</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <style>
        /* Täysruutukartta */
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; font-family: Arial, sans-serif; background: #000; }
        #map { height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; z-index: 1; }

        /* Piilotetaan perinteinen valkoinen reittilistanäkymä */
        .leaflet-routing-container { display: none !important; }

        /* HUD-taso kartan päällä */
        .hud-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; pointer-events: none; }
        .interactive { pointer-events: auto; }

        /* YLÄVALIKKO: Haku ja hallinta */
        .top-menu { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(30, 41, 59, 0.95); padding: 10px 20px; border-radius: 8px; border: 2px solid #64748B; display: flex; gap: 10px; align-items: center; }
        .top-menu input { padding: 12px; font-size: 18px; border-radius: 4px; border: 1px solid #ccc; width: 250px; background: #fff; color: #000; }
        .top-menu button { padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 4px; border: none; cursor: pointer; }
        .btn-start { background: #22C55E; color: white; }
        .btn-stop { background: #EF4444; color: white; }

        /* OIKEA YLÄKULMA: Pyöreät nopeusmittarit */
        .speed-zones { position: absolute; top: 15px; right: 20px; display: flex; flex-direction: column; gap: 10px; }
        .hud-circle { width: 85px; height: 85px; border-radius: 50%; background: rgba(0, 0, 0, 0.85); border: 5px solid #22C55E; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; }
        .hud-circle .num { font-size: 28px; line-height: 1; }
        .hud-circle .unit { font-size: 10px; color: #94A3B8; }
        /* Hälytystila ylinopeudella */
        .hud-circle.speed-limit.danger { border-color: #EF4444; color: #EF4444; background: rgba(239, 68, 68, 0.2); }

        /* DYNAAMINEN OPASSUUNTA: Alapalkin yläpuolella kelluva laatikko */
        #floating-instruction { position: absolute; bottom: 125px; left: 50%; transform: translateX(-50%); background: rgba(0, 85, 255, 0.95); color: white; padding: 15px 30px; border-radius: 12px; font-size: 28px; font-weight: bold; border: 2px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; min-width: 450px; display: none; }

        /* ALAPALKKI: Tilarivi */
        .bottom-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 110px; background: #1E293B; border-top: 4px solid #38BDF8; display: grid; grid-template-columns: 1fr 1.5fr 1fr; align-items: center; color: white; text-align: center; }
        .bar-section { border-right: 2px solid #334155; height: 70%; display: flex; flex-direction: column; justify-content: center; }
        .bar-section:last-child { border-right: none; }
        .bar-label { font-size: 12px; color: #38BDF8; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .bar-value { font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="hud-layer">
        
        <div class="top-menu interactive">
            <input type="text" id="destination" placeholder="Syötä kohteen osoite...">
            <button class="btn-start" onclick="laskeReitti()">ALOITA</button>
            <button class="btn-stop" onclick="nollaaNavigointi()">LOPETA</button>
        </div>

        <div class="speed-zones interactive">
            <div id="limit-zone" class="hud-circle speed-limit">
                <span class="num" id="hud-limit">80</span>
                <span class="unit">RAJOITUS</span>
            </div>
            <div class="hud-circle car-speed" style="border-color: #38BDF8;">
                <span class="num" id="hud-speed">0</span>
                <span class="unit">KM/H</span>
            </div>
        </div>

        <div id="floating-instruction">Aja suoraan</div>

        <div class="bottom-bar interactive">
            <div class="bar-section">
                <div class="bar-label">Nykyinen Tie</div>
                <div class="bar-value" id="hud-road">VT 7</div>
            </div>
            <div class="bar-section">
                <div class="bar-label">Seuraava Käännös</div>
                <div class="bar-value" id="hud-turn">Aja suoraan</div>
            </div>
            <div class="bar-section">
                <div class="bar-label">Etäisyys kohteeseen</div>
                <div class="bar-value" id="hud-dist">- m</div>
            </div>
        </div>

    </div>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([60.392, 25.666], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Sininen Navici-tyylinen ajonooli
        const naviciKuvake = L.divIcon({
            html: '<div style="width:0; height:0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 30px solid #0055ff; filter: drop-shadow(0px 0px 4px rgba(0,0,0,0.8));"></div>',
            className: 'navici-arrow',
            iconSize: [30, 30],
            iconAnchor: [15, 15]
        });
        
        let sijoitusMerkki = L.marker([60.392, 25.666], {icon: naviciKuvake}).addTo(map);
        let routingControl;
        let nykyinenRajoitus = 80;
        let currentStep = 0;
        let routeSteps = [];

        // GPS-seuranta ja automaattinen etappien vaihto
        navigator.geolocation.watchPosition(pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const userLatLng = L.latLng(lat, lon);
            const nopeus = Math.round(pos.coords.speed * 3.6 || 0);
            
            document.getElementById('hud-speed').innerText = nopeus;
            sijoitusMerkki.setLatLng(userLatLng);
            map.setView(userLatLng, 16);

            // Ylinopeustarkistus
            const limitYmpyra = document.getElementById('limit-zone');
            if (nopeus > nykyinenRajoitus) {
                limitYmpyra.classList.add('danger');
            } else {
                limitYmpyra.classList.remove('danger');
            }

            // GPS-seurantaan perustuva reittiohjeiden vaihto risteyksissä
            if (routeSteps.length > 0 && currentStep < routeSteps.length) {
                const nextStep = routeSteps[currentStep];
                
                // Päivitetään jäljellä oleva kokonaismatka dynaamisesti
                if (routingControl) {
                    // Jos ollaan lähellä nykyisen ohjeen risteyspistettä (alle 40 metriä)
                    // Huom: OSRM-koordinaattien puuttuessa simuloituna, Leaflet Routing Machine päivittää tilan
                    if (nextStep.distance < 40) {
                        currentStep++;
                        paivitaHUDOhjeet();
                    }
                }
            }
        }, null, { enableHighAccuracy: true });

        // Reitityksen laskenta ja HUD-kytkentä
        function laskeReitti() {
            const hakuSana = document.getElementById('destination').value;
            
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(hakuSana)}&countrycodes=fi`)
                .then(res => res.json())
                .then(data => {
                    if (data.length > 0) {
                        const kohdeLatLng = L.latLng(data[0].lat, data[0].lon);
                        
                        if (routingControl) map.removeControl(routingControl);

                        routingControl = L.Routing.control({
                            waypoints: [sijoitusMerkki.getLatLng(), kohdeLatLng],
                            router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
                            createMarker: () => null,
                            lineOptions: { styles: [{ color: '#0055ff', weight: 8, opacity: 0.9 }] }
                        }).addTo(map);

                        routingControl.on('routesfound', function(e) {
                            const reitti = e.routes[0];
                            routeSteps = reitti.instructions;
                            currentStep = 0;
                            
                            document.getElementById('floating-instruction').style.display = 'block';
                            document.getElementById('hud-dist').innerText = Math.round(reitti.summary.totalDistance) + " m";
                            if(reitti.name) document.getElementById('hud-road').innerText = reitti.name;
                            
                            paivitaHUDOhjeet();
                        });
                    }
                });
        }

        // HUD-tekstien päivitys
        function paivitaHUDOhjeet() {
            if (currentStep < routeSteps.length) {
                const vaihe = routeSteps[currentStep];
                document.getElementById('floating-instruction').innerText = vaihe.text;
                document.getElementById('hud-turn').innerText = vaihe.text;
            }
        }

        // Lopeta ja nollaa järjestelmä
        function nollaaNavigointi() {
            if (routingControl) map.removeControl(routingControl);
            routeSteps = [];
            document.getElementById('destination').value = "";
            document.getElementById('floating-instruction').style.display = 'none';
            document.getElementById('hud-turn').innerText = "Aja suoraan";
            document.getElementById('hud-dist').innerText = "- m";
            document.getElementById('hud-road').innerText = "VT 7";
        }
    </script>
</body>
</html>
