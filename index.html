<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>NASTA Pro - Korjattu Versio</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin:0; padding:0; height:100vh; overflow:hidden; background:#000; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .hud { position: absolute; z-index: 1000; }
        .top-left { top: 20px; left: 20px; }
        .nav-btn { height: 60px; width: 200px; font-weight: bold; cursor: pointer; background: #000; color: #fff; border: 2px solid #fff; }
        
        /* Alapalkki */
        .bottom-bar { 
            bottom: 0; left: 0; width: 100%; height: 100px; 
            background: rgba(0,0,0,0.9); border-top: 4px solid #fff; 
            display: flex; align-items: center; justify-content: space-between; padding: 0 40px; color: #fff;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="hud top-left">
        <button class="nav-btn" onclick="alert('Haku avattu - Valitse kohde listasta')">NAVIGOINTI</button>
    </div>

    <div class="bottom-bar">
        <div>TIE: <span id="road">PAIKANNUS...</span></div>
        <div>VAUHTI: <span id="speed">0</span> km/h</div>
        <div>RAJOITUS: <span id="limit">80</span></div>
    </div>

    <script>
        const map = L.map('map').setView([60.392, 25.666], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Seurataan sijaintia aktiivisesti
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                const kmh = Math.round(pos.coords.speed * 3.6 || 0);
                
                document.getElementById('speed').innerText = kmh;
                map.setView([lat, lng], 16); // Seuraa sijaintia
                
                // Päivitä tien nimi (tässä tarvittaisiin OSM-rajapintakysely, nyt simuloitu)
                document.getElementById('road').innerText = "Porvoonväylä (VT7)";
            }, err => {
                document.getElementById('road').innerText = "SALLI SIJAINTI!";
            }, { enableHighAccuracy: true });
        } else {
            alert("Selaimesi ei tue GPS-paikannusta.");
        }
    </script>
</body>
</html>
