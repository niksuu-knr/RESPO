<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ensihoidon Kirjaamisjärjestelmä (Merlot Medi & SV210 + Historia)</title>
    <style>
        :root {
            --primary-color: #005a9c;
            --secondary-color: #eef6fb;
            --dark-color: #333;
            --light-color: #fff;
            --border-color: #ccc;
            --success-color: #28a745;
            --alert-color: #dc3545;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: var(--dark-color);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .container {
            background: var(--light-color);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .history-container {
            background: var(--light-color);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-top: 4px solid var(--primary-color);
            height: fit-content;
        }

        header {
            text-align: center;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        header h1 {
            color: var(--primary-color);
            margin: 0;
            font-size: 24px;
        }

        /* Välilehdet (Tabs) */
        .tabs {
            display: flex;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 12px 24px;
            cursor: pointer;
            background: #e9e9e9;
            border: none;
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
            margin-right: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: var(--light-color);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Lomakerakenne */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"], input[type="date"], input[type="time"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
            height: 100px;
        }

        fieldset {
            border: 1px solid var(--primary-color);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
            background-color: var(--secondary-color);
        }

        legend {
            font-weight: bold;
            color: var(--primary-color);
            padding: 0 10px;
        }

        /* Painikkeet */
        .btn-container {
            text-align: right;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-success {
            background-color: var(--success-color);
            color: white;
        }

        /* Vitalilistaus */
        .vitals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }

        /* Historia-osion tyylit */
        .history-item {
            background: #f9f9f9;
            border: 1px solid var(--border-color);
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            font-size: 13px;
        }
        .history-item strong {
            color: var(--primary-color);
        }

        .alert-no-history {
            color: #666;
            font-style: italic;
        }

        @media (max-width: 900px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
            .grid-2, .grid-3 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="main-layout">
    
    <!-- VASEN PUOLI: LOMAKE -->
    <div class="container">
        <header>
            <h1>eEnsihoidon Kirjaamisalusta</h1>
            <p style="margin: 5px 0 0 0; color: #666;">Merlot Medi & SV210 + Potilashistoria HETU:lla</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'perustiedot')">1. Perustiedot</button>
            <button class="tab-btn" onclick="openTab(event, 'merlot_kliininen')">2. Kliininen tila (Merlot)</button>
            <button class="tab-btn" onclick="openTab(event, 'sv210_matka')">3. Matkatiedot (SV210)</button>
        </div>

        <form id="ensihoitoForm" onsubmit="tallennaTiedot(event)">
            
            <!-- VÄLILEHTI 1: PERUSTIEDOT -->
            <div id="perustiedot" class="tab-content active">
                <fieldset>
                    <legend>Potilaan tiedot</legend>
                    <div class="form-group">
                        <label for="hetu">Henkilötunnus (Hae historiatiedot syöttämällä tämä)</label>
                        <input type="text" id="hetu" placeholder="PPKKVV-XXXX" required oninput="haePotilashistoria()">
                    </div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label for="sukuNimi">Sukunimi</label>
                            <input type="text" id="sukuNimi" required>
                        </div>
                        <div class="form-group">
                            <label for="etuNimet">Etunimet</label>
                            <input type="text" id="etuNimet" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="kotikunta">Kotikunta</label>
                        <input type="text" id="kotikunta">
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Tehtävän tiedot</legend>
                    <div class="grid-3">
                        <div class="form-group">
                            <label for="yksikko">Yksikkö</label>
                            <input type="text" id="yksikko" placeholder="esim. EPP321" required>
                        </div>
                        <div class="form-group">
                            <label for="tehtavatunnus">Tehtävätunnus</label>
                            <input type="text" id="tehtavatunnus" placeholder="2026-XXXXX">
                        </div>
                        <div class="form-group">
                            <label for="kiireellisyys">Kiireellisyys</label>
                            <select id="kiireellisyys">
                                <option value="A">A</option>
                                <option value="B">B</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                            </select>
                        </div>
                    </div>
                </fieldset>
            </div>

            <!-- VÄLILEHTI 2: MERLOT KLIININEN TILA -->
            <div id="merlot_kliininen" class="tab-content">
                <fieldset>
                    <legend>Vitalifunktiot (Merlot)</legend>
                    <div class="vitals-grid">
                        <div class="form-group">
                            <label for="syke">Syke (bpm)</label>
                            <input type="text" id="syke">
                        </div>
                        <div class="form-group">
                            <label for="rr">Verenpaine</label>
                            <input type="text" id="rr" placeholder="120/80">
                        </div>
                        <div class="form-group">
                            <label for="sat">SpO2 (%)</label>
                            <input type="text" id="sat">
                        </div>
                        <div class="form-group">
                            <label for="hengitystaajuus">Hengitystaajuus</label>
                            <input type="text" id="hengitystaajuus">
                        </div>
                        <div class="form-group">
                            <label for="gcs">GCS</label>
                            <input type="text" id="gcs">
                        </div>
                        <div class="form-group">
                            <label for="verensokeri">Verensokeri</label>
                            <input type="text" id="verensokeri">
                        </div>
                    </div>
                    
                    <div class="form-group" style="margin-top: 15px;">
                        <label for="hoidonKuvaus">Anamneesi, status ja annettu hoito</label>
                        <textarea id="hoidonKuvaus" required></textarea>
                    </div>
                </fieldset>
            </div>

            <!-- VÄLILEHTI 3: SV210 MATKAtiedot -->
            <div id="sv210_matka" class="tab-content">
                <fieldset>
                    <legend>Kela SV210 Matkatiedot</legend>
                    <div class="grid-2">
                        <div class="form-group">
                            <label for="lahtopaikka">Lähtöpaikka</label>
                            <input type="text" id="lahtopaikka">
                        </div>
                        <div class="form-group">
                            <label for="maaranpaa">Määränpää</label>
                            <input type="text" id="maaranpaa">
                        </div>
                    </div>

                    <div class="grid-3">
                        <div class="form-group">
                            <label for="pvm">Matkapäivä</label>
                            <input type="date" id="pvm">
                        </div>
                        <div class="form-group">
                            <label for="lahtoAika">Lähtöaika</label>
                            <input type="time" id="lahtoAika">
                        </div>
                        <div class="form-group">
                            <label for="perillaAika">Perillä</label>
                            <input type="time" id="perillaAika">
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label for="kilometrit">Kilometrit</label>
                            <input type="text" id="kilometrit">
                        </div>
                        <div class="form-group">
                            <label for="maksaja">Maksaja</label>
                            <select id="maksaja">
                                <option value="kela">Kela-korvattava (SV210)</option>
                                <option value="kunta_hva">Hyvinvointialue</option>
                                <option value="itsepursu">Itse maksava</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="svPerustelu">Sairaankuljetuksen lääketieteellinen perustelu (Kela)</label>
                        <select id="svPerustelu">
                            <option value="Tila vaatii jatkuvaa seurantaa/hoitoa">Tila vaatii jatkuvaa seurantaa/hoitoa</option>
                            <option value="Paari- tai makuukuljetuksen tarve">Paari- tai makuukuljetuksen tarve</option>
                            <option value="Tartuntavaara tai muu lääketieteellinen syy">Tartuntavaara tai muu lääketieteellinen syy</option>
                        </select>
                    </div>
                </fieldset>

                <div class="btn-container">
                    <button type="submit" class="btn btn-success">Tallenna & Lukitse kertomus</button>
                </div>
            </div>

        </form>
    </div>

    <!-- OIKEA PUOLI: POTILASHISTORIA -->
    <div class="history-container">
        <h2>Potilaan historia</h2>
        <div id="historianNaytto">
            <p class="alert-no-history">Syötä henkilötunnus nähdäksesi aiemmat ensihoitokertomukset.</p>
        </div>
    </div>

</div>

<script>
    // Asetetaan kuluva päivämäärä oletukseksi matkapäivään
    document.getElementById('pvm').valueAsDate = new Date();

    // Välilehtien vaihtaminen
    function openTab(evt, tabName) {
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].classList.remove("active");
        }
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].classList.remove("active");
        }
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    // FUNKTIO: Hakee historian HETU:n perusteella
    function haePotilashistoria() {
        const hetu = document.getElementById('hetu').value.trim();
        const historiaNaytto = document.getElementById('historianNaytto');
        
        if (hetu.length < 6) {
            historiaNaytto.innerHTML = '<p class="alert-no-history">Syötä henkilötunnus nähdäksesi aiemmat ensihoitokertomukset.</p>';
            return;
        }

        // Haetaan localStoragesta hetun takana olevat kertomukset
        const aiemmatKertomukset = JSON.parse(localStorage.getItem(hetu)) || [];

        if (aiemmatKertomukset.length === 0) {
            historiaNaytto.innerHTML = '<p class="alert-no-history" style="color: var(--alert-color);">Ei aiempia ensihoitokertomuksia tässä laitteessa.</p>';
        } else {
            let html = `<h4>Löydetty ${aiemmatKertomukset.length} aiempaa tehtävää:</h4>`;
            
            // Käydään kertomukset läpi (uusin ensin)
            aiemmatKertomukset.reverse().forEach((kertomus, index) => {
                html += `
                    <div class="history-item">
                        <strong>Pvm/Aika:</strong> ${kertomus.pvm} klo ${kertomus.lahtoAika || '--:--'}<br>
                        <strong>Yksikkö & Tehtävä:</strong> ${kertomus.yksikko} (${kertomus.kiireellisyys}) / ${kertomus.tehtavatunnus || 'Ei tunnusta'}<br>
                        <strong>Vitalit:</strong> HR: ${kertomus.syke} | RR: ${kertomus.rr} | SpO2: ${kertomus.sat}% | GCS: ${kertomus.gcs}<br>
                        <strong>Hoito & Anamneesi:</strong> <span style="white-space: pre-wrap;">${kertomus.hoidonKuvaus}</span><br>
                        <strong>Kuljetus:</strong> ${kertomus.matka} (${kertomus.kelaPerustelu})
                    </div>
                `;
            });
            historiaNaytto.innerHTML = html;
        }
    }

    // FUNKTIO: Tallentaa uuden kertomuksen potilaan HETU:n alle
    function tallennaTiedot(event) {
        event.preventDefault();
        
        const hetu = document.getElementById('hetu').value.trim();
        if (!hetu) {
            alert("Virhe: Henkilötunnus vaaditaan!");
            return;
        }

        // Luodaan objekti tämänhetkisistä tiedoista
        const uusiKertomus = {
            pvm: document.getElementById('pvm').value,
            lahtoAika: document.getElementById('lahtoAika').value,
            yksikko: document.getElementById('yksikko').value,
            tehtavatunnus: document.getElementById('tehtavatunnus').value,
            kiireellisyys: document.getElementById('kiireellisyys').value,
            syke: document.getElementById('syke').value || 'ei mitattu',
            rr: document.getElementById('rr').value || 'ei mitattu',
            sat: document.getElementById('sat').value || 'ei mitattu',
            gcs: document.getElementById('gcs').value || 'ei mitattu',
            hoidonKuvaus: document.getElementById('hoidonKuvaus').value,
            matka: document.getElementById('lahtopaikka').value + ' -> ' + document.getElementById('maaranpaa').value,
            kelaPerustelu: document.getElementById('svPerustelu').value
        };

        // Haetaan vanhat tiedot alta tai luodaan tyhjä lista jos uusi potilas
        let potilaanHistoria = JSON.parse(localStorage.getItem(hetu)) || [];
        
        // Lisätään uusi kertomus listan jatkoksi
        potilaanHistoria.push(uusiKertomus);
        
        // Tallennetaan takaisin selaimeen
        localStorage.setItem(hetu, JSON.stringify(potilaanHistoria));

        alert("Ensihoitokertomus lukittu ja tallennettu onnistuneesti potilaan HETU:n alle!");
        
        // Päivitetään historianäkymä heti
        haePotilashistoria();
        
        // Tyhjennetään lomakkeen kliiniset tiedot seuraavaa varten, mutta jätetään potilastiedot näkyviin
        document.getElementById('syke').value = '';
        document.getElementById('rr').value = '';
        document.getElementById('sat').value = '';
        document.getElementById('hengitystaajuus').value = '';
        document.getElementById('gcs').value = '';
        document.getElementById('verensokeri').value = '';
        document.getElementById('hoidonKuvaus').value = '';
    }
</script>

</body>
</html>
