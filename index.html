<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASTA Pro - Navigaattori</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <style>
        body { margin:0; padding:0; background:#000; color:#fff; font-family: sans-serif; overflow:hidden; }
        #map { height: 100vh; width: 100vw; }
        .hud-top { position: absolute; top:0; width: 100%; height: 100px; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: space-around; z-index: 1000; font-size: 2rem; border-bottom: 4px solid #fff; }
        .hud-bottom { position: absolute; bottom:0; width: 100%; height: 150px; background: #000; border-top: 4px solid #fff; display: flex; align-items: center; justify-content: space-around; z-index: 1000; font-size: 2.5rem; font-weight: bold; }
        .val { color: #0f0; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="hud-top">
        <div>TIE: <span id="road" class="val">VT7</span></div>
        <div>VAUHTI: <span id="speed" class="val">0</span> km/h</div>
        <div>RAJOITUS: <span id="limit" class="val">80</span></div>
    </div>

    <div class="hud-bottom">
        <div>KÄÄNNÖS: <span id="turn" class="val">-</span></div>
        <div>MATKA: <span id="dist" class="val">-</span></div>
        <div>KAISTA: <span id="lane" class="val">-</span></div>
    </div>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([60.392, 25.666], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const control = L.Routing.control({
            waypoints: [null, L.latLng(60.400, 25.670)],
            router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
            createMarker: () => null
        }).addTo(map);

        // Älykäs kaista-ennuste ja käännöslogiikka
        control.on('routesfound', (e) => {
            const instr = e.routes[0].instructions;
            let currentStep = 0;

            navigator.geolocation.watchPosition(pos => {
                const speedKmh = Math.round(pos.coords.speed * 3.6 || 0);
                document.getElementById('speed').innerText = speedKmh;
                
                // Kaista-ennuste: Päätellään ohjeesta
                const turnText = instr[currentStep].text.toLowerCase();
                document.getElementById('turn').innerText = instr[currentStep].text;
                document.getElementById('dist').innerText = Math.round(instr[currentStep].distance) + " m";
                
                // Kaista-logiikka
                if(turnText.includes("vasen")) document.getElementById('lane').innerText = "VASEN";
                else if(turnText.includes("oikea")) document.getElementById('lane').innerText = "OIKEA";
                else document.getElementById('lane').innerText = "KESKI";

                // Rajoitus-ennuste (Simuloitu alueen perusteella)
                document.getElementById('limit').innerText = (speedKmh > 80) ? "100" : "80";
                
                // Automaattinen etappi-hyppy
                if(instr[currentStep].distance < 30) currentStep++;
            }, null, { enableHighAccuracy: true });
        });
    </script>
</body>
</html>
