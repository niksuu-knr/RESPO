<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>NASTA Pro - Navigointi</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <style>
        body, html { margin:0; padding:0; height:100vh; background:#222; font-family: sans-serif; overflow:hidden; }
        .nasta-grid { display: grid; grid-template-columns: 350px 1fr 250px; grid-template-rows: 1fr 150px; height: 100vh; }
        
        .nav-footer { 
            grid-column: 1 / span 3; background:#000; border-top:4px solid #fff; 
            display:flex; align-items:center; padding:0 30px; gap:60px; color:white;
        }
        .turn-info { font-size: 2.2rem; font-weight:bold; }
        .lane-box { display:flex; gap:10px; }
        .lane { width:50px; height:90px; background:#333; position:relative; display:flex; align-items:center; justify-content:center; border:2px solid #555; }
        .lane.active { background:#0f0; color:#000; font-weight:bold; font-size:2rem; }
        .lane.blocked::after { content:'X'; color:red; font-size:3rem; font-weight:bold; }
    </style>
</head>
<body>

<div class="nasta-grid">
    <div style="background:#d4d4d4; padding:15px;"><h3>TEHTÄVÄT</h3></div>
    <div id="map" style="position:relative;"></div>
    <div style="background:#444;"></div>

    <div class="nav-footer">
        <div class="turn-info" id="next-turn">HAETAAN REITTIÄ...</div>
        <div class="lane-box" id="lane-guide"></div>
    </div>
</div>

<script>
    const map = L.map('map', { zoomControl: false }).setView([60.392, 25.666], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let route = L.Routing.control({
        waypoints: [L.latLng(60.392, 25.666), L.latLng(60.400, 25.670)],
        router: L.Routing.osrmv1({ profile: 'car' })
    }).addTo(map);

    // Päivitä alapalkki kun reitti muuttuu
    route.on('routesfound', function(e) {
        const instruction = e.routes[0].instructions[0].text;
        document.getElementById('next-turn').innerText = instruction.toUpperCase();
        
        // Simuloitu kaistaopastus (oikeassa systeemissä haettaisiin OSM-datasta)
        renderLanes(['blocked', 'active', 'blocked']);
    });

    function renderLanes(lanes) {
        const box = document.getElementById('lane-guide');
        box.innerHTML = '';
        lanes.forEach(tila => {
            const div = document.createElement('div');
            div.className = 'lane ' + (tila === 'active' ? 'active' : 'blocked');
            if(tila === 'active') div.innerText = '↑';
            box.appendChild(div);
        });
    }

    // GPS-seuranta
    navigator.geolocation.watchPosition(pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        route.spliceWaypoints(0, 1, L.latLng(lat, lon));
    });
</script>
</body>
</html>
