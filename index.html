<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>NASTA Pro - Tablet</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <style>
        body, html { margin:0; padding:0; height:100vh; background:#000; font-family: sans-serif; color: white; }
        #map { height: 100vh; width: 100vw; }
        
        .hud { position: absolute; z-index: 1000; }
        .top-left { top: 20px; left: 20px; width: 350px; }
        
        /* Haku: Suuri ja selkeä */
        .leaflet-control-geocoder { background: white; padding: 15px; border-radius: 5px; color: black; font-size: 1.5rem; }
        
        .bottom-bar { 
            bottom: 0; left: 0; width: 100%; height: 120px; 
            background: rgba(0,0,0,0.95); border-top: 4px solid #fff; 
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; font-size: 1.8rem;
        }
        .val { color: #0f0; font-weight: bold; }
        .start-gps-btn { background: #007bff; color: white; border: none; padding: 10px 20px; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="hud top-left">
        <button class="start-gps-btn" onclick="kaynnistaSeuranta()">KÄYNNISTÄ SEURANTA</button>
    </div>

    <div class="bottom-bar">
        <div>TIE: <span id="tie-nimi" class="val">-</span></div>
        <div>RAJOITUS: <span id="rajoitus" class="val">-</span></div>
        <div>VAUHTI: <span id="oma-nopeus" class="val">0</span> km/h</div>
    </div>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([60.392, 25.666], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Haku (Geocoding)
        L.Control.geocoder({ defaultMarkGeocode: true }).addTo(map);

        function kaynnistaSeuranta() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition(pos => {
                    const speed = Math.round(pos.coords.speed * 3.6 || 0);
                    document.getElementById('oma-nopeus').innerText = speed;
                    map.setView([pos.coords.latitude, pos.coords.longitude], 16);
                    document.getElementById('tie-nimi').innerText = "Paikannettu...";
                }, null, { enableHighAccuracy: true });
            }
        }
    </script>
</body>
</html>
