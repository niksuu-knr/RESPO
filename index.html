<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>NASTA V-112 Integroitu</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin:0; padding:0; background:#333; overflow:hidden; font-family: sans-serif; }
        .nasta-main { display: grid; grid-template-columns: 320px 1fr 250px; grid-template-rows: 1fr 110px; height: 100vh; }
        
        .panel-left { background:#e0e0e0; padding:10px; overflow-y:auto; }
        .alert-box { background:red; color:white; padding:10px; margin-bottom:10px; font-weight:bold; border:2px solid #fff; }
        .panel-map { position:relative; background:#222; }
        #map { height: 100%; width: 100%; }
    </style>
</head>
<body>

<div class="nasta-main">
    <div class="panel-left" id="alert-container">
        <h3>NASTA - LIIKENNETIEDOT</h3>
        </div>
    
    <div class="panel-map">
        <div id="map"></div>
    </div>

    <div style="background:#444; color:white; padding:15px;">
        <p>JÄRJESTELMÄ: ONLINE</p>
        <p>DATALINKKI: FINTRAFFIC API</p>
    </div>
</div>

<script>
    const map = L.map('map', { zoomControl: false }).setView([61.497, 23.760], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Haetaan tiedotteet Fintrafficilta
    async function haeTiedotteet() {
        try {
            const res = await fetch('https://tie.digitraffic.fi/api/traffic-message/v1/messages');
            const data = await res.json();
            const alertContainer = document.getElementById('alert-container');
            
            // Suodatetaan vain aktiiviset ja merkittävät
            data.body.filter(m => m.severity === 'SEVERE').forEach(msg => {
                const div = document.createElement('div');
                div.className = 'alert-box';
                div.innerText = "HÄIRIÖ: " + msg.title;
                alertContainer.appendChild(div);
                
                // Lisätään merkki kartalle
                L.marker([msg.location.lat, msg.location.lon]).addTo(map).bindPopup(msg.title);
            });
        } catch(e) {
            console.log("Ei tiedotteita saatavilla");
        }
    }

    haeTiedotteet();
    // Päivitetään tiedotteet 5 min välein
    setInterval(haeTiedotteet, 300000);
</script>
</body>
</html>
