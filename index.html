<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NASTA Pro Navigaattori</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <style>
        body, html { margin:0; padding:0; height:100vh; width:100vw; overflow:hidden; background:#000; color:#fff; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        .hud { position: absolute; top: 10px; left: 10px; z-index: 1000; width: 95%; max-width: 400px; }
        .nav-btn { width: 100%; padding: 20px; font-size: 1.5rem; font-weight: bold; background: #000; color: #fff; border: 3px solid #fff; cursor: pointer; }
        
        .bottom-bar { 
            position: absolute; bottom: 0; width: 100%; height: 120px; background: rgba(0,0,0,0.95); 
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; font-size: 1.5rem; z-index: 1000;
        }
        .data-box { text-align: center; }
        .val { color: #0f0; display: block; font-size: 2rem; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="hud">
        <button class="nav-btn" onclick="aloitaHaku()">VALITSE KOHDE</button>
    </div>

    <div class="bottom-bar">
        <div class="data-box">TIE<span id="tie-info" class="val">-</span></div>
        <div class="data-box">RAJOITUS<span id="nopeus-rajoitus" class="val">80</span></div>
        <div class="data-box">VAUHTI<span id="oma-nopeus" class="val">0</span></div>
    </div>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([60.392, 25.666], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let routingControl;
        let userPos;

        // Seurataan sijaintia
        navigator.geolocation.watchPosition(pos => {
            userPos = L.latLng(pos.coords.latitude, pos.coords.longitude);
            document.getElementById('oma-nopeus').innerText = Math.round(pos.coords.speed * 3.6 || 0);
            map.setView(userPos, 15);
        }, null, { enableHighAccuracy: true });

        function aloitaHaku() {
            const dest = prompt("Kirjoita määränpää (esim. Porvoo):");
            if(dest) {
                // Tässä oikeassa sovelluksessa tehtäisiin geocoding-haku
                // Nyt piirretään reitti simuloituun kohteeseen
                if (routingControl) map.removeControl(routingControl);
                routingControl = L.Routing.control({
                    waypoints: [userPos, L.latLng(60.392, 25.666)],
                    router: L.Routing.osrmv1({ profile: 'car' })
                }).addTo(map);
                document.getElementById('tie-info').innerText = "VT7";
            }
        }
    </script>
</body>
</html>
