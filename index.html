<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codea eEHK - Koulutussimulaattori</title>
    <style>
        :root {
            --codea-dark: #22252a;
            --codea-panel: #2f333a;
            --codea-input: #3a3f47;
            --codea-orange: #e67e22;
            --codea-yellow: #f1c40f;
            --codea-green: #2ecc71;
            --codea-text: #ffffff;
            --codea-text-dim: #a0a5b0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--codea-dark);
            color: var(--codea-text);
            user-select: none;
            overflow: hidden;
            height: 100vh;
        }

        /* PÄÄRAKENNE */
        .codea-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* YLÄPALKKI (Tehtävän tiedot ja hätäkeskusdata) */
        .codea-header {
            background-color: #1a1c1f;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--codea-orange);
        }

        .mission-info {
            font-size: 0.9rem;
            font-weight: bold;
        }
        .mission-info span {
            color: var(--codea-yellow);
        }

        /* KESKIALUE (Rullaavat kortit) */
        .codea-main {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .codea-page {
            display: none;
        }

        .codea-page.active {
            display: block;
        }

        /* CODEA KORTTI-RAKENNE */
        .codea-card {
            background-color: var(--codea-panel);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .card-title {
            font-size: 1rem;
            font-weight: bold;
            color: var(--codea-orange);
            margin-bottom: 12px;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Syöttörivid */
        .codea-row {
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
        }

        .codea-row label {
            font-size: 0.8rem;
            color: var(--codea-text-dim);
            margin-bottom: 4px;
            font-weight: 600;
        }

        .input-group {
            display: flex;
            gap: 5px;
        }

        .codea-input {
            flex: 1;
            background-color: var(--codea-input);
            border: 1px solid #555;
            color: var(--codea-text);
            padding: 10px;
            font-size: 0.9rem;
            border-radius: 4px;
            outline: none;
        }

        /* Kosketusnäppäimet */
        .codea-btn {
            background-color: #4a515c;
            border: none;
            color: white;
            padding: 10px 14px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .codea-btn:active {
            background-color: var(--codea-orange);
        }

        .btn-clock { background-color: #34495e; color: #5dade2; }
        .btn-select { background-color: #5d6d7e; }

        /* ALAVALIKKO (Codean tyypillinen navigaatio kuvakkeilla/teksteillä alhaalla) */
        .codea-navbar {
            background-color: #1a1c1f;
            display: flex;
            height: 65px;
            border-top: 1px solid #333;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--codea-text-dim);
            cursor: pointer;
            border-right: 1px solid #25282e;
        }

        .nav-item:active, .nav-item.active {
            background-color: var(--codea-panel);
            color: var(--codea-orange);
        }

        .nav-item .icon {
            font-size: 1.3rem;
            margin-bottom: 3px;
        }

        /* LÄÄKETAULUKKO */
        .codea-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
        }
        .codea-table th, .codea-table td {
            padding: 8px;
            font-size: 0.85rem;
            border-bottom: 1px solid #444;
            text-align: left;
        }
        .codea-table th { color: var(--codea-text-dim); }

        /* MODAL POPUP */
        .codea-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: var(--codea-panel);
            border: 2px solid var(--codea-orange);
            width: 85%;
            max-width: 600px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 12px;
            font-weight: bold;
            background-color: #1a1c1f;
            text-align: center;
            border-bottom: 1px solid #444;
        }

        .modal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 15px;
            max-height: 350px;
            overflow-y: auto;
        }

        .modal-grid-btn {
            background-color: var(--codea-input);
            border: 1px solid #555;
            color: white;
            padding: 15px 10px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
        }

        .modal-grid-btn:active {
            background-color: var(--codea-orange);
        }
    </style>
</head>
<body>

    <div class="codea-container">
        
        <div class="codea-header">
            <div class="mission-info">Tehtävä: <span>E721 (721A)</span></div>
            <div class="mission-info">Koodi: <span>702 (Rintakipu)</span></div>
            <button class="codea-btn" style="background-color: var(--codea-green);" onclick="tallennaKertomus()">Valmis / Lähetä</button>
        </div>

        <div class="codea-main">
            
            <div id="page-perustiedot" class="codea-page active">
                <div class="codea-card">
                    <div class="card-title">Potilaan tunnistus</div>
                    <div class="codea-row">
                        <label>Henkilötunnus</label>
                        <div class="input-group">
                            <input type="text" id="hetu" class="codea-input" placeholder="PPKKVV-XXXX">
                        </div>
                    </div>
                </div>

                <div class="codea-card">
                    <div class="card-title">Tapahtumatiedot</div>
                    <div class="codea-row">
                        <label>Pääoire / Ensisijainen syy</label>
                        <div class="input-group">
                            <input type="text" id="paaoire" class="codea-input" readonly>
                            <button type="button" class="codea-btn btn-select" onclick="avaaCodeaValikko('paaoire')">Valitse</button>
                        </div>
                    </div>
                    <div class="codea-row">
                        <label>Kohteen tyyppi</label>
                        <div class="input-group">
                            <input type="text" id="kohdeTyyppi" class="codea-input" readonly>
                            <button type="button" class="codea-btn btn-select" onclick="avaaCodeaValikko('kohdeTyyppi')">Valitse</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="page-vitalit" class="codea-page">
                <div class="codea-card">
                    <div class="card-title">Hengitys & Verenkierto</div>
                    <div class="codea-row">
                        <label>Hengitystie (A)</label>
                        <div class="input-group">
                            <input type="text" id="ilmatie" class="codea-input" readonly>
                            <button type="button" class="codea-btn btn-select" onclick="avaaCodeaValikko('ilmatie')">Valitse</button>
                        </div>
                    </div>
                    <div class="codea-row">
                        <label>Sydänrytmi (ECG)</label>
                        <div class="input-group">
                            <input type="text" id="rytmi" class="codea-input" readonly>
                            <button type="button" class="codea-btn btn-select" onclick="avaaCodeaValikko('rytmi')">Valitse</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="page-laakkeet" class="codea-page">
                <div class="codea-card">
                    <div class="card-title">Lääkitys & Nesteytys</div>
                    <div class="codea-row">
                        <label>Valitse annettava lääkeaine</label>
                        <div class="input-group">
                            <input type="text" id="valittuLaake" class="codea-input" placeholder="Klikkaa valitse..." readonly onclick="avaaCodeaValikko('valittuLaake')">
                        </div>
                    </div>
                    <div class="codea-row">
                        <label>Antotapa</label>
                        <div class="input-group">
                            <input type="text" id="valittuTapa" class="codea-input" readonly onclick="avaaCodeaValikko('valittuTapa')">
                        </div>
                    </div>
                    <button class="codea-btn" style="background-color: var(--codea-orange); width: 100%; margin-top: 10px;" onclick="kirjaaLaakeAnnetuksi()">+ Kirjaa lääke annetuksi</button>
                </div>

                <div class="codea-card">
                    <div class="card-title">Annetut lääkkeet aikajana</div>
                    <table class="codea-table">
                        <thead>
                            <tr>
                                <th>Klo</th>
                                <th>Lääke</th>
                                <th>Reitti</th>
                            </tr>
                        </thead>
                        <tbody id="codeaLaakeLoki">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="page-paatos" class="codea-page">
                <div class="codea-card">
                    <div class="card-title">Tehtävän päätös (Koodit)</div>
                    <div class="codea-row">
                        <label>X- tai Y-tuloskoodi</label>
                        <div class="input-group">
                            <input type="text" id="tuloskoodi" class="codea-input" readonly>
                            <button type="button" class="codea-btn btn-select" onclick="avaaCodeaValikko('tuloskoodi')">Valitse</button>
                        </div>
                    </div>
                    <div class="codea-row">
                        <label>Kuljetusperuste (Kela SV210)</label>
                        <div class="input-group">
                            <input type="text" id="kelaSyy" class="codea-input" readonly>
                            <button type="button" class="codea-btn btn-select" onclick="avaaCodeaValikko('kelaSyy')">Valitse</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <div class="codea-navbar">
            <div class="nav-item active" onclick="vaihdaCodeaSivu('perustiedot', this)">
                <div class="icon">👤</div>
                Perustiedot
            </div>
            <div class="nav-item" onclick="vaihdaCodeaSivu('vitalit', this)">
                <div class="icon">🫀</div>
                Vitalit
            </div>
            <div class="nav-item" onclick="vaihdaCodeaSivu('laakkeet', this)">
                <div class="icon">🧪</div>
                Lääkehoito
            </div>
            <div class="nav-item" onclick="vaihdaCodeaSivu('paatos', this)">
                <div class="icon">🚑</div>
                Päätös
            </div>
        </div>

    </div>

    <div id="codeaModal" class="codea-modal">
        <div class="modal-content">
            <div class="modal-header" id="codeaModalOtsikko">Valitse pika-arvo</div>
            <div class="modal-grid" id="codeaModalGrid"></div>
            <div class="codea-btn" style="margin: 15px; text-align: center; background-color: #555;" onclick="suljeCodeaValikko()">Peruuta</div>
        </div>
    </div>

    <script>
        // CODEAN TARKAT KOSKETUSSANASTOT
        const codeaSanastot = {
            paaoire: ["Rintakipu / Sydänoire", "Hengenahdistus", "Tajuttomuus / Eloton", "Aivoverenkiertohäiriö", "Kouristelu", "Tapaturma / Vamma"],
            kohdeTyyppi: ["Yksityisasunto", "Julkinen paikka", "Hoitolaitos / Palvelutalo", "Liikenneväylä / Katu", "Oppilaitos"],
            ilmatie: ["Auki / Esteetön", "Uhkana tukkeutuminen", "Nieluputki / Vetotila", "Larynxmaski (I-Gel)", "Intuboitu"],
            rytmi: ["Sinusrytmi (SR)", "Eteisvärinä (Flamma)", "Sinustakykardia", "Kammionlinen (VF/VT)", "Asystole / PEA"],
            valittuLaake: ["ASA 300 mg", "Nitro 0.4 mg s.l.", "Fentanyyli 50 µg", "Oksikodoni 2 mg", "Salbutamoli 5 mg", "Adrenaliini 1 mg"],
            valittuTapa: ["i.v. (Laskimoon)", "s.l. (Kielen alle)", "p.o. (Suun kautta)", "inh. (Inhalaatio)", "i.o. (Luuhun)"],
            tuloskoodi: ["X-0: Kuljetetaan kohteeseen", "X-5: Ei kuljetustarvetta", "X-4: Tarkistettu, hoito kohteessa", "Y-1: Todettu kuolleeksi"],
            kelaSyy: ["Jatkuva monitorointi tarpeen", "Makuukuljetusvaatimus (Paarit)", "Lääkinnällinen valvonta ajon aikana", "Ei korvausperustetta"]
        };

        let nykyinenKenttaId = "";

        // Sivunvaihtologiikka
        function vaihdaCodeaSivu(sivuId, element) {
            document.querySelectorAll('.codea-page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + sivuId).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
        }

        // Avaa Codea-tyylisen popup-valikon
        function avaaCodeaValikko(kenttaId) {
            nykyinenKenttaId = kenttaId;
            const modal = document.getElementById('codeaModal');
            const grid = document.getElementById('codeaModalGrid');
            
            document.getElementById('codeaModalOtsikko').innerText = "Valitse arvo kenttään";
            grid.innerHTML = "";

            codeaSanastot[kenttaId].forEach(vaihtoehto => {
                const btn = document.createElement('button');
                btn.className = "modal-grid-btn";
                btn.innerText = vaihtoehto;
                btn.onclick = function() {
                    document.getElementById(nykyinenKenttaId).value = vaihtoehto;
                    suljeCodeaValikko();
                };
                grid.appendChild(btn);
            });

            modal.style.display = "flex";
        }

        function suljeCodeaValikko() {
            document.getElementById('codeaModal').style.display = "none";
        }

        // Lääkkeen kirjaus aikajanalle
        function kirjaaLaakeAnnetuksi() {
            const laake = document.getElementById('valittuLaake').value;
            const tapa = document.getElementById('valittuTapa').value;

            if (!laake || !tapa) {
                alert("Virhe: Valitse ensin lääkeaine ja antotapa!");
                return;
            }

            const nyt = new Date();
            const klo = nyt.toTimeString().split(' ')[0].substring(0, 5);
            
            const tbody = document.getElementById('codeaLaakeLoki');
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="color:var(--codea-yellow); font-weight:bold;">${klo}</td>
                <td>${laake}</td>
                <td style="color:var(--codea-text-dim);">${tapa.split(' ')[0]}</td>
            `;
            tbody.appendChild(tr);

            // Tyhjennetään valinnat seuraavaa varten
            document.getElementById('valittuLaake').value = "";
            document.getElementById('valittuTapa').value = "";
        }

        function tallennaKertomus() {
            const hetu = document.getElementById('hetu').value;
            if(!hetu) {
                alert("LÄHETYS EPÄONNISTUI: Potilaan henkilötunnus on pakollinen tieto viranomaisarkistoon!");
                return;
            }
            alert("CODEA JÄRJESTELMÄ:\nSähköinen ensihoitokertomus (eEHK) lukittu ja siirretty Kanta-arkistoon sekö sairaalan tietojärjestelmään.");
        }
    </script>
</body>
</html>
