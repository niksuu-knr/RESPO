<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>NASTA Pro - Navigointi</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #000; }
        #map { height: 100vh; width: 100vw; }
        
        /* HUD-näkymä kartan päällä */
        .hud-navi {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(0,0,0,0.85); color: #fff; padding: 15px;
            border: 2px solid #ff9900; border-radius: 8px; width: 300px;
        }
        .turn-text { font-size: 1.4rem; font-weight: bold; margin-bottom: 10px; }
        .distance-text { font-size: 1.1rem; color: #ff9900; }
    </style>
</head>
<body>

    <div class="hud-navi">
        <div class="turn-text" id="turn-instruction">Etsitään reittiä...</div>
        <div class="distance-text" id="distance-info">-- km jäljellä</div>
    </div>

    <div id="map"></div>

    <script>
        const map = L.map('map').setView([61.497, 23.760], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Alustetaan reititysohjain
        let routingControl = L.Routing.control({
            waypoints: [
                L.latLng(61.497, 23.760), // Lähtöpiste (GPS päivittää tämän)
                L.latLng(61.482, 23.753)  // Kohdepiste (esim. Hatanpää)
            ],
            router: L.Routing.osrmv1({ profile: 'car' }),
            showAlternatives: false,
            addWaypoints: false,
            routeWhileDragging: false
        }).addTo(map);

        // Päivitetään ohjeet HUD-näkymään kun reitti löytyy
        routingControl.on('routesfound', function(e) {
            const routes = e.routes;
            const summary = routes[0].summary;
            const instruction = routes[0].instructions[0].text;
            
            document.getElementById('turn-instruction').innerText = instruction;
            document.getElementById('distance-info').innerText = 
                (summary.totalDistance / 1000).toFixed(1) + " km jäljellä | " + 
                Math.round(summary.totalTime / 60) + " min";
        });

        // Simuloidaan GPS-päivitystä (oikeassa autossa tämä lukee laitteen sirua)
        navigator.geolocation.watchPosition(pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            routingControl.spliceWaypoints(0, 1, L.latLng(lat, lon));
        });
    </script>
</body>
</html>
