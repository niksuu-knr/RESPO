<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAM4s SPS-2000 Firmware Simulator</title>
    
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

    <div id="display">SAM4s SPS-2000 | SYSTEM READY</div>

    <div id="keyboard"></div>

   <script src="src/kernel.js"></script>
    <script src="src/parser.js"></script>
    <script src="src/controller.js"></script>
    <script src="src/reports.js"></script>
    <script src="src/interface.js"></script>

    <script>
        // Käytetään setTimeoutia varmistamaan, että kaikki moduulit ovat latautuneet
        window.addEventListener('load', () => {
            try {
                if(typeof UI !== 'undefined') {
                    UI.initKeyboard();
                    console.log("Kassa alustettu onnistuneesti.");
                } else {
                    console.error("UI-objektia ei löydy. Tarkista src/interface.js.");
                }
            } catch(e) {
                console.error("Virhe alustuksessa:", e);
            }
        });
    </script>
</body>
