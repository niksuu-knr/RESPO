<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASTA Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <style>
        body, html { margin:0; padding:0; height:100vh; overflow:hidden; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* HUD ja Kontrollit */
        .hud-overlay { position: absolute; z-index: 1000; width: 100%; height: 100%; pointer-events: none; }
        .controls { position: absolute; top: 20px; left: 20px; pointer-events: auto; background: #000; padding: 10px; border-radius: 8px; border: 2px solid #fff; }
        input { padding: 10px; font-size: 18px; width: 200px; }
        
        .speed-container { position: absolute; top: 20px; right: 20px; text-align: center; pointer-events: auto; }
        .circle { width: 90px; height: 90px; border-radius: 50%; border: 5px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; background: rgba(0,0,0,0.7); margin-bottom: 5px; color: #fff; }
        .danger { border-color: red; color: red; }
        
        .nav-hud { position: absolute; bottom: 0; width: 100%; height: 100px; background: rgba(0,0,0,0.8); color: #fff; display: flex; align-items: center; justify-content: space-around; font-size: 20px; border-top: 3px solid #fff; pointer-events: auto; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="hud-overlay">
        <div class="controls">
            <input type="text" id="destination" placeholder="Hae kohde...">
            <button onclick="hakuJaReitti()">ALOITA</button>
            <button onclick="location.reload()">LOPETA</button>
        </div>

        <div class="speed-container">
            <div id="limit-circle" class="circle">80</div>
            <div id="speed-circle" class="circle">0</div>
        </div>

        <div class="nav-hud">
            <div>TIE: <span id="road-name">-</span></div>
            <div>KÄÄNNÖS: <span id="turn-dir">-</span></div>
            <div>MATKA: <span id="turn-dist">-</span></div>
        </div>
    </div>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([60.392, 25.666], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let routingControl;
        let userPos = L.latLng(60.392, 25.666); // Default

        // Seuraa sijaintia
        navigator.geolocation.watchPosition(pos => {
            userPos = L.latLng(pos.coords.latitude, pos.coords.longitude);
            document.getElementById('speed-circle').innerText = Math.round(pos.coords.speed * 3.6 || 0);
            map.setView(userPos, 17);
        }, null, { enableHighAccuracy: true });

        // Haku-logiikka
        function hakuJaReitti() {
            const destName = document.getElementById('destination').value;
            
            // Käytetään Geocoderia etsimään koordinaatit tekstistä
            L.Control.Geocoder.nominatim().geocode(destName, results => {
                if (results.length > 0) {
                    const destLatLng = results[0].center;
                    
                    if (routingControl) map.removeControl(routingControl);
                    
                    routingControl = L.Routing.control({
                        waypoints: [userPos, destLatLng],
                        router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
                        createMarker: () => null,
                        lineOptions: { styles: [{ color: 'blue', weight: 6 }] }
                    }).addTo(map);
                }
            });
        }
    </script>
</body>
</html>
