<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NASTA HUD</title>
    <style>
        body, html { margin:0; padding:0; height:100vh; background:#000; color:#fff; font-family: sans-serif; overflow:hidden; }
        /* HUD-palkki: Vain kriittinen tieto */
        .hud-bar { 
            position: absolute; top: 0; width: 100%; height: 120px; 
            background: rgba(0,0,0,0.9); border-bottom: 4px solid #fff; 
            display: flex; align-items: center; justify-content: space-around; font-size: 2rem;
        }
        /* Haku: Koko näytön peittävä, kunnes valittu */
        #search-overlay { 
            position: absolute; top: 120px; width: 100%; height: calc(100% - 120px); 
            background: #000; padding: 20px; box-sizing: border-box; 
        }
        input { width: 100%; height: 80px; font-size: 2rem; background: #222; color: #fff; border: 2px solid #fff; }
        .nav-btn { background: #007bff; color: #fff; padding: 20px; margin-top: 10px; width: 100%; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div class="hud-bar">
        <div>KÄÄNNÖS: <span id="turn-dir">OIKEAAN</span></div>
        <div>MATKA: <span id="turn-dist">350 m</span></div>
        <div>KAISTA: <span id="lane-info">OIKEA</span></div>
    </div>

    <div id="search-overlay">
        <input type="text" id="dest-input" placeholder="Syötä määränpää...">
        <button class="nav-btn" onclick="aloitaNavigointi()">AVAA GOOGLE MAPS / WAZE</button>
    </div>

    <script>
        function aloitaNavigointi() {
            const kohde = document.getElementById('dest-input').value;
            // Tämä avaa puhelimen/tabletin navigointisovelluksen
            window.location.href = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(kohde)}`;
            document.getElementById('search-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
