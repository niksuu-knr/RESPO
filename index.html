<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NASTA Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <style>
        /* Pakotetaan koko ruutu käyttöön */
        body, html { margin:0; padding:0; height:100vh; width:100vw; overflow:hidden; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; position: absolute; top:0; left:0; z-index: 1; }
        
        /* HUD on aina kartan päällä */
        .hud-overlay { position: absolute; top:0; left:0; width: 100%; height: 100%; z-index: 9999; pointer-events: none; }
        
        /* Kontrollit (Napit ja syöttö) */
        .controls { position: absolute; top: 20px; left: 20px; pointer-events: auto; background: #fff; padding: 15px; border: 2px solid #000; }
        
        /* Nopeusmittari */
        .speed-box { position: absolute; top: 20px; right: 20px; pointer-events: auto; }
        .circle { width: 90px; height: 90px; border-radius: 50%; border: 4px solid #000; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .danger { border-color: red; color: red; }
        
        /* Navigointipalkki */
        .nav-hud { position: absolute; bottom: 0; left: 0; width: 100%; height: 100px; background: rgba(0,0,0,0.85); color: #fff; display: flex; align-items: center; justify-content: space-around; pointer-events: auto; font-size: 1.5rem; border-top: 3px solid #fff; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="hud-overlay">
        <div class="controls">
            <input type="text" id="destination" placeholder="Määränpää...">
            <button onclick="hakuJaReitti()">ALOITA</button>
            <button onclick="window.location.reload()">LOPETA</button>
        </div>

        <div class="speed-box">
            <div id="limit-circle" class="circle">80</div>
            <div id="speed-circle" class="circle">0</div>
        </div>

        <div class="nav-hud">
            <div>TIE: <span id="road-name">-</span></div>
            <div>KÄÄNNÖS: <span id="turn-dir">-</span></div>
            <div>MATKA: <span id="turn-dist">-</span></div>
        </div>
    </div>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([60.392, 25.666], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let routingControl;

        function hakuJaReitti() {
            const dest = document.getElementById('destination').value;
            // Yksinkertaistettu haku (testataan osoitehaulla)
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${dest}`)
                .then(r => r.json())
                .then(data => {
                    if(data.length > 0) {
                        const target = L.latLng(data[0].lat, data[0].lon);
                        if(routingControl) map.removeControl(routingControl);
                        routingControl = L.Routing.control({
                            waypoints: [null, target],
                            router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' })
                        }).addTo(map);
                    }
                });
        }

        // GPS päivitys
        navigator.geolocation.watchPosition(pos => {
            const speed = Math.round(pos.coords.speed * 3.6 || 0);
            document.getElementById('speed-circle').innerText = speed;
            if(speed > 80) document.getElementById('limit-circle').classList.add('danger');
            else document.getElementById('limit-circle').classList.remove('danger');
        }, null, { enableHighAccuracy: true });
    </script>
</body>
</html>
