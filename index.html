<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perinteinen Kassakone Simulaattori</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; user-select: none; }
        body { background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: #333; }

        /* KASSIKONEEN RUNKO */
        .cash-register {
            background-color: #e2e8f0; /* Klassinen tietokoneen harmaa */
            border: 4px solid #cbd5e1;
            border-radius: 8px;
            width: 680px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 2px 5px #fff;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* YLÄOSA: NÄYTTÖ JA KUITTI */
        .top-section {
            display: flex;
            gap: 15px;
            height: 220px;
        }

        /* PERINTEINEN PAPERIKUITTI */
        .paper-roll {
            width: 240px;
            background-color: #fffdf0; /* Kellertävä kuittipaperi */
            border: 1px solid #ccc;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1), 0 4px 6px rgba(0,0,0,0.1);
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .receipt-line { display: flex; justify-content: space-between; margin-bottom: 2px; }

        /* DIGITAALINEN VFD-NÄYTTÖ (Klassinen vihreä/oranssi loisteputkinäyttö) */
        .vfd-display {
            flex: 1;
            background-color: #051b11; /* Syvä tummanvihreä */
            border: 5px solid #475569;
            border-radius: 4px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.8);
        }
        .vfd-text {
            color: #22c55e; /* Kirkas loisteputken vihreä */
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
            text-transform: uppercase;
        }
        .vfd-main { font-size: 32px; text-align: right; letter-spacing: 2px; }
        .vfd-sub { font-size: 14px; text-align: left; opacity: 0.8; }

        /* NÄPPÄIMISTÖALUE */
        .keyboard {
            background-color: #cbd5e1;
            border: 2px solid #94a3b8;
            border-radius: 6px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        /* PERINTEISET KOHONÄPPÄIMET */
        .key {
            background-color: #f1f5f9;
            border: 1px solid #94a3b8;
            border-bottom: 4px solid #64748b; /* Syvyysvaikutelma */
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            text-shadow: 0 1px 0 #fff;
        }
        .key:active {
            border-bottom-width: 1px;
            transform: translateY(3px);
        }

        /* NÄPPÄINTEN VÄRIKOODIT (Kuten aidoissa kassoissa) */
        .key-num { background-color: #ffffff; color: #000; font-size: 18px; } /* Numerot valkoisia */
        .key-dept { background-color: #60a5fa; color: white; text-shadow: none; font-size: 12px; } /* Osastot sinisiä */
        .key-fn { background-color: #94a3b8; color: #1e293b; font-size: 11px; } /* Toiminnot harmaita */
        .key-clear { background-color: #ef4444; color: white; text-shadow: none; } /* C-nappi punainen */
        .key-total { background-color: #22c55e; color: white; text-shadow: none; grid-row: span 2; height: 118px; font-size: 16px; } /* Käteismaksu suuri ja vihreä */

        .section-title {
            font-size: 11px;
            color: #64748b;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: -5px;
            grid-column: span 7;
        }
    </style>
</head>
<body>

    <div class="cash-register">
        <div class="top-section">
            <div class="paper-roll" id="receiptPaper">
                <div style="text-align: center; font-weight: bold; margin-bottom: 10px;">*** KUITTI ***</div>
                <div id="receiptLines">
                    </div>
            </div>

            <div class="vfd-display">
                <div class="vfd-text vfd-sub" id="vfdSubDisplay">VALMIS - SYÖTÄ HINTA</div>
                <div class="vfd-text vfd-main" id="vfdMainDisplay">0.00</div>
            </div>
        </div>

        <div class="keyboard">
            
            <button class="key key-clear" onclick="pressClear()">C</button>
            <button class="key key-fn" onclick="pressVoid()">KORJAUS<br>VOID</button>
            <button class="key key-fn" onclick="pressMultiplier()">X<br>MÄÄRÄ</button>
            <button class="key key-fn" onclick="pressOpenDrawer()">AVAA<br>LAATIKKO</button>
            <div style="grid-column: span 1;"></div>
            <button class="key key-dept" onclick="pressDept(1, 'RUOKA 14%')">OSASTO 1<br>RUOKA 14%</button>
            <button class="key key-dept" onclick="pressDept(2, 'MIEDOT 25.5%')">OSASTO 2<br>MIEDOT</button>

            <button class="key key-num" onclick="pressNum('7')">7</button>
            <button class="key key-num" onclick="pressNum('8')">8</button>
            <button class="key key-num" onclick="pressNum('9')">9</button>
            <button class="key key-fn" onclick="alert('Z-Raportti ajettu! Päivä nollattu paperirullalle.')">Z<br>RAPORTTI</button>
            <div style="grid-column: span 1;"></div>
            <button class="key key-dept" onclick="pressDept(3, 'VÄKEVÄT 25.5%')">OSASTO 3<br>VÄKEVÄT</button>
            <button class="key key-dept" onclick="pressDept(4, 'ALKOHOLITON')">OSASTO 4<br>ALKOHOLITON</button>

            <button class="key key-num" onclick="pressNum('4')">4</button>
            <button class="key key-num" onclick="pressNum('5')">5</button>
            <button class="key key-num" onclick="pressNum('6')">6</button>
            <button class="key key-fn" onclick="pressSubTotal()">VÄLISUMMA<br>SUB-TTL</button>
            <div style="grid-column: span 1;"></div>
            <button class="key key-dept" onclick="pressDept(5, 'POPPARI/SIPS')">OSASTO 5<br>SNAX</button>
            <button class="key key-total" onclick="pressCashFinal()">KÄTEINEN<br>CASH<br>TL</button>

            <button class="key key-num" onclick="pressNum('1')">1</button>
            <button class="key key-num" onclick="pressNum('2')">2</button>
            <button class="key key-num" onclick="pressNum('3')">3</button>
            <button class="key key-fn" onclick="alert('Korttipääte aktivoitu summan mukaan!')">KORTTI<br>CHG</button>
            <div style="grid-column: span 1;"></div>
            <button class="key key-dept" onclick="pressDept(6, 'MUUT TUOTTEET')">OSASTO 6<br>MUUT</button>
            <button class="key key-num" onclick="pressNum('0')">0</button>
            <button class="key key-num" onclick="pressNum('00')">00</button>
            <div style="grid-column: span 5;"></div>
        </div>
    </div>

    <script>
        let inputString = "";       // Kerää näppäilyt senteinä (esim "850" = 8.50)
        let activeMultiplier = 1;   // X-määräkerroin
        let runningCart = [];       // Kuittirivit kesken olevassa ostoksessa
        let isSubTotalState = false;// Onko painettu välisummaa
        let isVoidMode = false;     // Onko VOID-painike päällä seuraavaa varten

        const mainDisp = document.getElementById("vfdMainDisplay");
        const subDisp = document.getElementById("vfdSubDisplay");
        const receiptLines = document.getElementById("receiptLines");
        const receiptPaper = document.getElementById("receiptPaper");

        // NUMERONÄPPÄILY
        function pressNum(val) {
            if(isSubTotalState) {
                // Jos oltiin välisummassa, uusi numero tarkoittaa asiakkaan antamaa käteistä rahaa
                inputString += val;
                let cashAmount = parseFloat(inputString) / 100;
                mainDisp.innerText = cashAmount.toFixed(2);
                subDisp.innerText = "SAATU KÄTEINEN";
            } else {
                // Normaalisti syötetään hintaa tai määrää
                inputString += val;
                if(inputString.length > 8) inputString = inputString.substring(0,8);
                renderInputValue();
            }
        }

        function renderInputValue() {
            if(inputString === "") {
                mainDisp.innerText = "0.00";
            } else {
                let currentVal = parseFloat(inputString) / 100;
                mainDisp.innerText = currentVal.toFixed(2);
            }
        }

        // CLEAR (C)
        function pressClear() {
            inputString = "";
            isVoidMode = false;
            renderInputValue();
            subDisp.innerText = "VALMIS";
        }

        // X/MÄÄRÄ-KERROIN
        function pressMultiplier() {
            let val = parseInt(inputString);
            if(!isNaN(val) && val > 0) {
                activeMultiplier = val;
                subDisp.innerText = "MÄÄRÄ LUO: " + activeMultiplier + " X";
                inputString = "";
                mainDisp.innerText = "0.00";
            } else {
                subDisp.innerText = "VIRHE: SYÖTÄ MÄÄRÄ ENNSIN";
            }
        }

        // VOID / KORJAUS
        function pressVoid() {
            isVoidMode = true;
            subDisp.innerText = "*** KORJAUSTILA (VOID) ***";
        }

        // OSASTONÄPPÄIN (DEPT) -> Lyö tuotteen sisään hinnan ja kertoimen pohjalta
        function pressDept(deptNumber, deptName) {
            let price = parseFloat(inputString) / 100;
            if(isNaN(price) || price <= 0) {
                subDisp.innerText = "VIRHE: SYÖTÄ HINTA";
                return;
            }

            if(isVoidMode) {
                // Vähennetään kuitilta (Void)
                runningCart.push({ name: "KORJ-" + deptName, price: -price, qty: activeMultiplier });
                printToPaper(`-${activeMultiplier}X ${deptName}`, -(price * activeMultiplier));
                subDisp.innerText = "RIVI KORJATTU";
                isVoidMode = false;
            } else {
                // Normaalimyynti osastolle
                runningCart.push({ name: deptName, price: price, qty: activeMultiplier });
                if(activeMultiplier > 1) {
                    printToPaper(`${activeMultiplier} X ${price.toFixed(2)}`, "");
                }
                printToPaper(`OSASTO ${deptNumber} ${deptName}`, price * activeMultiplier);
                subDisp.innerText = "REKISTERÖITY OS " + deptNumber;
            }

            // Nollataan syötteet seuraavaa varten
            inputString = "";
            activeMultiplier = 1;
            mainDisp.innerText = "0.00";
        }

        // TULOSTUS PAPERIRULLALLE
        function printToPaper(text, priceVal) {
            const div = document.createElement("div");
            div.className = "receipt-line";
            
            let priceStr = (typeof priceVal === "number" && priceVal !== 0) 
                ? priceVal.toFixed(2) + " EUR" 
                : (priceVal === 0 ? "0.00 EUR" : "");
                
            div.innerHTML = `<span>${text}</span><span>${priceStr}</span>`;
            receiptLines.appendChild(div);
            receiptPaper.scrollTop = receiptPaper.scrollHeight;
        }

        // VÄLISUMMA (SUB-TOTAL)
        function pressSubTotal() {
            if(runningCart.length === 0) return;
            
            let total = runningCart.reduce((s, i) => s + (i.price * i.qty), 0);
            mainDisp.innerText = total.toFixed(2);
            subDisp.innerText = "VÄLISUMMA YHTEENSÄ";
            
            printToPaper("----------------------", "");
            printToPaper("VÄLISUMMA YHTEENSÄ", total);
            
            isSubTotalState = true;
            inputString = ""; // Valmistaudutaan vastaanottamaan käteistä rahaa näppäimistöltä
        }

        // KÄTEINEN (TL) - LOPETTAA KAUPAN JA LASKEE VAIHTORAHAN
        function pressCashFinal() {
            if(runningCart.length === 0) return;

            let total = runningCart.reduce((s, i) => s + (i.price * i.qty), 0);
            let paidAmount = total;

            // Jos myyjä oli näppäillyt asiakkaan antaman summan senteissä
            if(inputString !== "") {
                paidAmount = parseFloat(inputString) / 100;
            }

            if(paidAmount < total) {
                subDisp.innerText = "RAHA EI RIITÄ!";
                return;
            }

            let changeDue = paidAmount - total;

            // Tulostetaan loppulaskenta paperille
            printToPaper("KÄTEINEN / TL", paidAmount);
            printToPaper("TAKASIN / VAIHTO", changeDue);
            printToPaper("======================", "");
            printToPaper("KIITOS KÄYNNISTÄ!", "");
            printToPaper(" ", ""); // Tyhjä rivi väliin

            // Päivitetään vihreä loisteputkinäyttö isolla
            mainDisp.innerText = changeDue.toFixed(2);
            subDisp.innerText = "TAKASINANNETTAVA VAIHTORAHA";

            // Nollataan koneen sisäinen tila seuraavaa asiakasta varten
            runningCart = [];
            inputString = "";
            activeMultiplier = 1;
            isSubTotalState = false;
            isVoidMode = false;
        }

        // MEKAANINEN OPEN DRAWER -NÄPPÄIN
        function pressOpenDrawer() {
            subDisp.innerText = "LAATIKKO AUKI (KOLAHDUS)";
            alert("Kassalipas kolahti mekaanisesti auki!");
        }
    </script>
</body>
</html>
