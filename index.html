<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>NASTA V-112 PÄÄTE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <style>
        body { margin:0; padding:0; background:#222; font-family: sans-serif; overflow:hidden; }
        .grid { display:grid; grid-template-columns: 350px 1fr 250px; height:100vh; }
        .panel { padding:15px; display:flex; flex-direction:column; gap:10px; }
        .left { background:#d4d4d4; border-right:4px solid #000; }
        .map-box { position:relative; }
        #map { height:100%; width:100%; }
        .right { background:#444; color:#fff; }
        .btn { padding:15px; font-weight:bold; cursor:pointer; border:none; }
        .alert { background:red; color:white; padding:10px; font-size:0.8rem; margin-top:5px; }
    </style>
</head>
<body>

<div class="grid">
    <div class="panel left" id="alert-zone">
        <h3>NASTA - LIIKENNETIEDOT</h3>
    </div>
    <div class="map-box"><div id="map"></div></div>
    <div class="panel right">
        <h3>PIKANÄPPÄIMET</h3>
        <button class="btn" onclick="asetaKohde([60.39, 25.66])">PORVOO SAIRAALA</button>
        <button class="btn" onclick="asetaKohde([60.16, 24.94])">HELSINKI</button>
    </div>
</div>

<script>
    const map = L.map('map').setView([60.392, 25.666], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let routeControl = L.Routing.control({
        waypoints: [L.latLng(60.392, 25.666)],
        router: L.Routing.osrmv1({ profile: 'car' })
    }).addTo(map);

    function asetaKohde(coords) {
        routeControl.setWaypoints([L.latLng(60.392, 25.666), L.latLng(coords[0], coords[1])]);
    }

    async function tarkistaHäiriöt() {
        const res = await fetch('https://tie.digitraffic.fi/api/traffic-message/v1/messages');
        const data = await res.json();
        const container = document.getElementById('alert-zone');
        
        data.body.filter(m => m.severity === 'SEVERE').forEach(msg => {
            const el = document.createElement('div');
            el.className = 'alert';
            el.innerText = msg.title;
            container.appendChild(el);
            // Karttamerkintä
            L.marker([msg.location.lat, msg.location.lon]).addTo(map).bindPopup(msg.title);
        });
    }

    tarkistaHäiriöt();
</script>
</body>
</html>
