<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NASTA Pro</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; font-family: Arial, sans-serif; background: #000; }
        #map { height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; z-index: 1; }

        .leaflet-routing-container { display: none !important; }

        /* HUD-taso kartan päällä */
        .hud-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; pointer-events: none; }
        .interactive { pointer-events: auto; }

        /* YLÄVALIKKO: Haku, hallinta ja ehdotukset */
        .search-container { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; width: 450px; }
        .top-menu { background: rgba(30, 41, 59, 0.95); padding: 10px 20px; border-radius: 8px; border: 2px solid #64748B; display: flex; gap: 10px; align-items: center; }
        .top-menu input { padding: 12px; font-size: 18px; border-radius: 4px; border: 1px solid #ccc; flex-grow: 1; background: #fff; color: #000; }
        .top-menu button { padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 4px; border: none; cursor: pointer; }
        .btn-start { background: #22C55E; color: white; }
        .btn-stop { background: #EF4444; color: white; }

        .suggestions-list { background: #fff; color: #000; border-radius: 4px; border: 1px solid #64748B; max-height: 200px; overflow-y: auto; list-style: none; margin: 5px 0 0 0; padding: 0; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .suggestions-list li { padding: 10px 15px; cursor: pointer; font-size: 16px; border-bottom: 1px solid #eee; }
        .suggestions-list li:hover { background: #38BDF8; color: #fff; }

        /* OIKEA YLÄKULMA: Pyöreät nopeusmittarit */
        .speed-zones { position: absolute; top: 15px; right: 20px; display: flex; flex-direction: column; gap: 10px; }
        .hud-circle { width: 85px; height: 85px; border-radius: 50%; background: rgba(0, 0, 0, 0.85); border: 5px solid #22C55E; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; transition: all 0.3s ease; }
        .hud-circle .num { font-size: 28px; line-height: 1; }
        .hud-circle .unit { font-size: 10px; color: #94A3B8; }
        
        .hud-circle.speed-limit.danger { border-color: #EF4444; color: #EF4444; background: rgba(239, 68, 68, 0.3); box-shadow: 0 0 15px #EF4444; }

        /* DYNAAMINEN OPASSUUNTA: Uusi graafinen elementti (sininen pyöristetty laatikko valkoisella nuolella) */
        #floating-instruction-box { 
            position: absolute; 
            bottom: 125px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(0, 85, 255, 0.95); 
            color: white; 
            padding: 15px 25px; 
            border-radius: 16px; 
            border: 2px solid #fff; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.6); 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            min-width: 450px; 
            max-width: 600px;
            display: none; 
        }
        .arrow-container {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .arrow-svg {
            width: 45px;
            height: 45px;
            fill: #ffffff;
            transition: transform 0.5s ease-in-out;
        }
        .instruction-text-container {
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        .instruction-main-text {
            font-size: 26px; 
            font-weight: bold;
            line-height: 1.2;
        }
        .instruction-distance-text {
            font-size: 18px;
            color: #E0F2FE;
            font-weight: 600;
            margin-top: 2px;
        }

        /* ALAPALKKI */
        .bottom-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 110px; background: #1E293B; border-top: 4px solid #38BDF8; display: grid; grid-template-columns: 1fr 1.2fr 1fr 0.8fr 0.8fr; align-items: center; color: white; text-align: center; }
        .bar-section { border-right: 2px solid #334155; height: 70%; display: flex; flex-direction: column; justify-content: center; padding: 0 10px; }
        .bar-section:last-child { border-right: none; }
        .bar-label { font-size: 11px; color: #38BDF8; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 0.5px; }
        .bar-value { font-size: 22px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="hud-layer">
        
        <div class="search-container interactive">
            <div class="top-menu">
                <input type="text" id="destination" placeholder="Syötä kohteen osoite..." oninput="haeEhdotukset(this.value)">
                <button class="btn-start" onclick="laskeReittiSuoraan()">ALOITA</button>
                <button class="btn-stop" onclick="nollaaNavigointi()">LOPETA</button>
            </div>
            <ul id="suggestions" class="suggestions-list"></ul>
        </div>

        <div class="speed-zones interactive">
            <div id="limit-zone" class="hud-circle speed-limit">
                <span class="num" id="hud-limit">--</span>
                <span class="unit">RAJOITUS</span>
            </div>
            <div class="hud-circle car-speed" style="border-color: #38BDF8;">
                <span class="num" id="hud-speed">0</span>
                <span class="unit">KM/H</span>
            </div>
        </div>

        <div id="floating-instruction-box">
            <div class="arrow-container">
                <svg class="arrow-svg" id="guidance-arrow" viewBox="0 0 24 24">
                    <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/>
                </svg>
            </div>
            <div class="instruction-text-container">
                <span class="instruction-main-text" id="guidance-text">Aja suoraan</span>
                <span class="instruction-distance-text" id="guidance-distance"></span>
            </div>
        </div>

        <div class="bottom-bar interactive">
            <div class="bar-section">
                <div class="bar-label">Nykyinen Tie</div>
                <div class="bar-value" id="hud-road">-</div>
            </div>
            <div class="bar-section">
                <div class="bar-label">Seuraava Käännös</div>
                <div class="bar-value" id="hud-turn">Aja suoraan</div>
            </div>
            <div class="bar-section">
                <div class="bar-label">Matka kohteeseen</div>
                <div class="bar-value" id="hud-dist">- m</div>
            </div>
            <div class="bar-section">
                <div class="bar-label">Matka-aika</div>
                <div class="bar-value" id="hud-duration">- min</div>
            </div>
            <div class="bar-section">
                <div class="bar-label">Perillä klo</div>
                <div class="bar-value" id="hud-eta">--:--</div>
            </div>
        </div>

    </div>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([60.392, 25.666], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const naviciKuvake = L.divIcon({
            html: '<div style="width:0; height:0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 30px solid #0055ff; filter: drop-shadow(0px 0px 4px rgba(0,0,0,0.8));"></div>',
            className: 'navici-arrow',
            iconSize: [30, 30],
            iconAnchor: [15, 15]
        });
        
        let sijoitusMerkki = L.marker([60.392, 25.666], {icon: naviciKuvake}).addTo(map);
        let routingControl;
        let nykyinenRajoitus = 0;
        let viimeisinLat = 0;
        let viimeisinLon = 0;
        let currentStep = 0;
        let routeSteps = [];
        let valittuKohdeLatLng = null;
        let hakuAjastin;
        let navigointiPaattynyt = false;

        // SANAKIRJA: Muuttaa englanninkieliset opastustermit suomeksi ja palauttaa samalla nuolen kulman (asteina)
        function kaannaSuomeksiJaHaeKulma(teksti) {
            if (!teksti) return { teksti: "Aja suoraan", kulma: 0 };
            
            let käännös = teksti;
            let kulma = 0; // Oletus: suoraan ylös (0 astetta)
            
            // Tunnistetaan suunnat ja asetetaan nuolen rotaatiokulmat
            if (/left/gi.test(teksti)) {
                if (/sharp/gi.test(teksti)) { kulma = -135; }
                else if (/slight/gi.test(teksti)) { kulma = -45; }
                else { kulma = -90; }
            } else if (/right/gi.test(teksti)) {
                if (/sharp/gi.test(teksti)) { kulma = 135; }
                else if (/slight/gi.test(teksti)) { kulma = 45; }
                else { kulma = 90; }
            } else if (/U-turn/gi.test(teksti)) {
                kulma = 180;
            }

            // Tekstien korvaukset suomeksi
            käännös = käännös.replace(/Head northeast/gi, "Aja koilliseen");
            käännös = käännös.replace(/Head northwest/gi, "Aja luoteeseen");
            käännös = käännös.replace(/Head southeast/gi, "Aja kaakkoon");
            käännös = käännös.replace(/Head southwest/gi, "Aja lounaaseen");
            käännös = käännös.replace(/Head north/gi, "Aja pohjoiseen");
            käännös = käännös.replace(/Head south/gi, "Aja etelään");
            käännös = käännös.replace(/Head east/gi, "Aja itään");
            käännös = käännös.replace(/Head west/gi, "Aja länteen");
            
            käännös = käännös.replace(/Turn sharp right/gi, "Käänny jyrkästi oikealle");
            käännös = käännös.replace(/Turn sharp left/gi, "Käänny jyrkästi vasemmalle");
            käännös = käännös.replace(/Turn slight right/gi, "Käänny loivasti oikealle");
            käännös = käännös.replace(/Turn slight left/gi, "Käänny loivasti vasemmalle");
            käännös = käännös.replace(/Turn right/gi, "Käänny oikealle");
            käännös = käännös.replace(/Turn left/gi, "Käänny vasemmalle");
            käännös = käännös.replace(/Make a U-turn/gi, "Tee u-käännös");
            käännös = käännös.replace(/Continue straight/gi, "Jatka suoraan");
            käännös = käännös.replace(/Keep right/gi, "Pysy oikealla");
            käännös = käännös.replace(/Keep left/gi, "Pysy vasemmalla");
            
            käännös = käännös.replace(/Enter the roundabout and take the 1st exit/gi, "Aja kiertoliittymään: 1. ulosmeno");
            käännös = käännös.replace(/Enter the roundabout and take the 2nd exit/gi, "Aja kiertoliittymään: 2. ulosmeno");
            käännös = käännös.replace(/Enter the roundabout and take the 3rd exit/gi, "Aja kiertoliittymään: 3. ulosmeno");
            käännös = käännös.replace(/Enter the roundabout and take the 4th exit/gi, "Aja kiertoliittymään: 4. ulosmeno");
            käännös = käännös.replace(/At the roundabout take the 1st exit/gi, "Kiertoliittymästä 1. ulosmeno");
            käännös = käännös.replace(/At the roundabout take the 2nd exit/gi, "Kiertoliittymästä 2. ulosmeno");
            käännös = käännös.replace(/At the roundabout take the 3rd exit/gi, "Kiertoliittymästä 3. ulosmeno");
            
            käännös = käännös.replace(/You have arrived at your destination/gi, "Olet saapunut kohteeseen");
            käännös = käännös.replace(/on the right/gi, "oikealla");
            käännös = käännös.replace(/on the left/gi, "vasemmalla");
            käännös = käännös.replace(/onto/gi, "tielle:");

            return { teksti: käännös, kulma: kulma };
        }

        // GPS-seuranta
        navigator.geolocation.watchPosition(pos => {
            if (navigointiPaattynyt) return;

            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const userLatLng = L.latLng(lat, lon);
            const nopeus = Math.round(pos.coords.speed * 3.6 || 0);
            
            document.getElementById('hud-speed').innerText = nopeus;
            sijoitusMerkki.setLatLng(userLatLng);
            map.setView(userLatLng, 16);

            if (viimeisinLat === 0 || map.distance([viimeisinLat, viimeisinLon], [lat, lon]) > 30) {
                viimeisinLat = lat;
                viimeisinLon = lon;
                haeNopeusrajoitus(lat, lon);
            }

            const limitYmpyra = document.getElementById('limit-zone');
            if (nykyinenRajoitus > 0 && nopeus > nykyinenRajoitus) {
                limitYmpyra.classList.add('danger');
            } else {
                limitYmpyra.classList.remove('danger');
            }

            // Reittipisteiden päivitys ja dynaamisen etäisyyden laskenta lennosta sekunnin välein
            if (routeSteps.length > 0 && currentStep < routeSteps.length) {
                const nextStep = routeSteps[currentStep];
                
                // Lasketaan reaaliaikainen etäisyys nykyisestä GPS-sijainnista seuraavaan käännöskohtaan
                const stepLatLng = L.latLng(nextStep.maneuver.location[0], nextStep.maneuver.location[1]);
                const etaisyysKaannokseen = Math.round(map.distance(userLatLng, stepLatLng));

                // Vaihdetaan seuraavaan ohjeeseen, kun ollaan tarpeeksi lähellä (alle 25 metriä)
                if (etaisyysKaannokseen < 25) {
                    currentStep++;
                    paivitaHUDOhjeet(etaisyysKaannokseen);
                } else {
                    paivitaHUDOhjeet(etaisyysKaannokseen);
                }

                // TARKISTUS 1: Automaattinen navigoinnin päättäminen metrilleen kohteessa
                if (valittuKohdeLatLng) {
                    const etaisyysKohteeseen = map.distance(userLatLng, valittuKohdeLatLng);
                    if (etaisyysKohteeseen <= 5) { // Alle 5 metriä lasketaan saapumiseksi GPS-epätarkkuus huomioiden
                        navigointiPaattynyt = true;
                        document.getElementById('guidance-text').innerText = "Olet saapunut kohteeseen!";
                        document.getElementById('guidance-distance').innerText = "0 m";
                        document.getElementById('hud-turn').innerText = "Perillä";
                        document.getElementById('hud-dist').innerText = "0 m";
                        
                        // Nollataan navigointi automaattisesti parin sekunnin kuluttua
                        setTimeout(() => {
                            nollaaNavigointi();
                        }, 4000);
                    }
                }
            }
        }, null, { enableHighAccuracy: true });

        function haeNopeusrajoitus(lat, lon) {
            const radius = 40;
            const query = `[out:json];way(around:${radius},${lat},${lon})[maxspeed];out tags;`;
            const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.elements && data.elements.length > 0) {
                        const tags = data.elements[0].tags;
                        if (tags.maxspeed) {
                            nykyinenRajoitus = parseInt(tags.maxspeed);
                            document.getElementById('hud-limit').innerText = nykyinenRajoitus;
                            
                            if (tags.name) {
                                document.getElementById('hud-road').innerText = tags.name;
                            } else if (tags.ref) {
                                document.getElementById('hud-road').innerText = tags.ref;
                            }
                            return;
                        }
                    }
                    if (nykyinenRajoitus === 0) {
                        document.getElementById('hud-limit').innerText = "--";
                    }
                })
                .catch(() => {});
        }

        // Autocomplete osoitehaulle
        function haeEhdotukset(teksti) {
            clearTimeout(hakuAjastin);
            const listaElementti = document.getElementById('suggestions');
            
            if (teksti.length < 3) {
                listaElementti.style.display = 'none';
                return;
            }

            hakuAjastin = setTimeout(() => {
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(teksti)}&countrycodes=fi&limit=5`)
                    .then(res => res.json())
                    .then(data => {
                        listaElementti.innerHTML = '';
                        if (data.length > 0) {
                            listaElementti.style.display = 'block';
                            data.forEach(paikka => {
                                const li = document.createElement('li');
                                li.innerText = paikka.display_name.split(',').slice(0, 3).join(',');
                                li.onclick = () => valitseEhdotus(paikka);
                                listaElementti.appendChild(li);
                            });
                        } else {
                            listaElementti.style.display = 'none';
                        }
                    });
            }, 300);
        }

        function valitseEhdotus(paikka) {
            document.getElementById('destination').value = paikka.display_name.split(',').slice(0, 3).join(',');
            document.getElementById('suggestions').style.display = 'none';
            valittuKohdeLatLng = L.latLng(paikka.lat, paikka.lon);
            laskeReitti(valittuKohdeLatLng);
        }

        function laskeReittiSuoraan() {
            const hakuSana = document.getElementById('destination').value;
            if (!hakuSana) return;
            
            if(valittuKohdeLatLng) {
                laskeReitti(valittuKohdeLatLng);
            } else {
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(hakuSana)}&countrycodes=fi&limit=1`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.length > 0) {
                            laskeReitti(L.latLng(data[0].lat, data[0].lon));
                        }
                    });
            }
        }

        function laskeReitti(kohdeLatLng) {
            if (routingControl) map.removeControl(routingControl);
            navigointiPaattynyt = false;

            routingControl = L.Routing.control({
                waypoints: [sijoitusMerkki.getLatLng(), kohdeLatLng],
                router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
                createMarker: () => null,
                lineOptions: { styles: [{ color: '#0055ff', weight: 8, opacity: 0.9 }] }
            }).addTo(map);

            routingControl.on('routesfound', function(e) {
                const reitti = e.routes[0];
                routeSteps = reitti.instructions;
                currentStep = 0;
                
                document.getElementById('floating-instruction-box').style.display = 'flex';
                
                const kokonaisMatka = reitti.summary.totalDistance;
                if (kokonaisMatka >= 1000) {
                    document.getElementById('hud-dist').innerText = (kokonaisMatka / 1000).toFixed(1) + " km";
                } else {
                    document.getElementById('hud-dist').innerText = Math.round(kokonaisMatka) + " m";
                }
                
                const kestoSekunnit = reitti.summary.totalTime;
                const kestoMinuutit = Math.round(kestoSekunnit / 60);
                document.getElementById('hud-duration').innerText = kestoMinuutit + " min";
                
                const perillaAika = new Date();
                perillaAika.setMinutes(perillaAika.getMinutes() + kestoMinuutit);
                const tunnit = String(perillaAika.getHours()).padStart(2, '0');
                const minuutit = String(perillaAika.getMinutes()).padStart(2, '0');
                document.getElementById('hud-eta').innerText = tunnit + ":" + minuutit;
                
                paivitaHUDOhjeet(Math.round(routeSteps[0].distance));
            });
        }

        // TARKISTUS 2 & 3: Päivitetään etäisyys dynaamisesti ja käännetään nuoligrafiikkaa nuoliston mukaisesti
        function paivitaHUDOhjeet(nykyinenEtaisyys) {
            if (currentStep < routeSteps.length) {
                const vaihe = routeSteps[currentStep];
                const dataohje = kaannaSuomeksiJaHaeKulma(vaihe.text);
                
                // Päivitetään pääteksti ylälaatikkoon ja alavalikkoon
                document.getElementById('guidance-text').innerText = dataohje.teksti;
                document.getElementById('hud-turn').innerText = dataohje.teksti + " (" + nykyinenEtaisyys + " m)";

                // Päivitetään dynaaminen etäisyysnäkymä nuolilaatikkoon
                if (nykyinenEtaisyys >= 1000) {
                    document.getElementById('guidance-distance').innerText = (nykyinenEtaisyys / 1000).toFixed(1) + " km päässä";
                } else {
                    document.getElementById('guidance-distance').innerText = nykyinenEtaisyys + " m päässä";
                }

                // Käännetään SVG-nuoli lennosta dynaamisen kulman mukaisesti
                document.getElementById('guidance-arrow').style.transform = `rotate(${dataohje.kulma}deg)`;
            }
        }

        function nollaaNavigointi() {
            if (routingControl) map.removeControl(routingControl);
            routeSteps = [];
            valittuKohdeLatLng = null;
            navigointiPaattynyt = false;
            document.getElementById('destination').value = "";
            document.getElementById('suggestions').style.display = 'none';
            document.getElementById('floating-instruction-box').style.display = 'none';
            document.getElementById('hud-turn').innerText = "Aja suoraan";
            document.getElementById('hud-dist').innerText = "- m";
            document.getElementById('hud-road').innerText = "-";
            document.getElementById('hud-duration').innerText = "- min";
            document.getElementById('hud-eta').innerText = "--:--";
        }
    </script>
</body>
</html>
