<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAM4S SPS-2000 Täydellinen Laiteemulaattori FIX</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; user-select: none; }
        body { background-color: #1a1a1e; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; }

        .terminal-frame {
            background-color: #334155;
            border: 14px solid #1e293b;
            border-radius: 20px;
            width: 1024px;
            height: 740px;
            padding: 6px;
            box-shadow: 0 35px 70px rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
        }

        .hardware-label {
            font-size: 12px;
            color: #94a3b8;
            padding: 2px 8px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        .lcd-screen {
            flex: 1;
            background-color: #2b5c8f;
            border: 4px solid #000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .mode-lock-bar {
            display: flex;
            background-color: #0f172a;
            border-bottom: 2px solid #000;
        }
        .mode-position {
            padding: 12px 24px;
            font-weight: bold;
            font-size: 14px;
            color: #94a3b8;
            border-right: 2px solid #000;
            cursor: pointer;
            background-color: #1e293b;
        }
        .mode-position.active {
            background-color: #ef4444;
            color: white;
        }
        .screen-status-info {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 15px;
            font-size: 12px;
            color: #34d399;
        }

        .main-interface {
            flex: 1;
            display: flex;
            padding: 4px;
            gap: 4px;
            background-color: #244d77;
        }

        .receipt-column {
            width: 320px;
            background-color: #f1f5f9;
            border: 2px solid #000;
            display: flex;
            flex-direction: column;
            color: #000;
        }
        .receipt-header {
            background-color: #1e3a8a;
            color: white;
            font-size: 11px;
            padding: 6px;
            font-weight: bold;
            text-align: center;
        }
        .receipt-scroll {
            flex: 1;
            padding: 8px;
            font-size: 13px;
            overflow-y: auto;
            background-color: #ffffff;
        }
        .bill-row { display: flex; justify-content: space-between; margin-bottom: 2px; }
        
        .operator-message-line {
            background-color: #000;
            color: #f43f5e;
            padding: 6px;
            font-weight: bold;
            font-size: 13px;
            border-top: 2px solid #000;
            min-height: 35px;
            display: flex;
            align-items: center;
        }
        .vfd-numeric-display {
            background-color: #020617;
            color: #22c55e;
            padding: 6px 10px;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .input-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .touch-matrix {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 4px;
        }

        .fixed-keypad {
            height: 240px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            border-top: 2px solid #000;
            padding-top: 4px;
        }

        .matrix-btn {
            border: 1px solid #000;
            border-bottom: 3px solid #000;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            color: #000;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4px;
            background-color: #cbd5e1;
        }
        .matrix-btn:active {
            border-bottom-width: 1px;
            transform: translateY(2px);
        }

        .sam-blue { background-color: #60a5fa; color: #fff; }
        .sam-green { background-color: #34d399; color: #000; }
        .sam-amber { background-color: #fbbf24; color: #000; }
        .sam-purple { background-color: #c084fc; color: #fff; }
        .sam-red { background-color: #f87171; color: #fff; }
        .sam-numpad { background-color: #f8fafc; color: #000; font-size: 22px; }
        .sam-cash { background-color: #059669; color: #fff; font-size: 16px; grid-row: span 2; }
        .sam-empty { background-color: #3b6fa6; border-color: #2b5c8f; color: rgba(0,0,0,0.2); }
        
        .mode-indicator-overlay {
            position: absolute;
            top: 50px;
            right: 10px;
            padding: 6px 14px;
            background-color: #dc2626;
            color: white;
            font-weight: bold;
            font-size: 13px;
            border-radius: 4px;
            z-index: 10;
            display: none;
        }

        /* JÄRJESTELMÄN DIAGLOGI-IKKUNAT */
        .sam-dialog-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            display: none;
        }
        .sam-dialog-box {
            background-color: #e2e8f0;
            border: 4px solid #0f172a;
            border-radius: 8px;
            width: 460px;
            padding: 20px;
            color: #000;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }
        .dialog-title { font-weight: bold; margin-bottom: 15px; font-size: 14px; color: #1e3a8a; border-bottom: 2px solid #cbd5e1; padding-bottom: 5px; }
        .dialog-field { margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px; }
        .dialog-field label { font-size: 11px; font-weight: bold; color: #475569; }
        .dialog-field input, .dialog-field select { padding: 8px; font-size: 14px; font-family: monospace; border: 2px solid #cbd5e1; border-radius: 4px; color: #000; background: #fff; }
        .dialog-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; }
        .dialog-btn { padding: 10px 20px; font-weight: bold; border: 1px solid #000; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="terminal-frame">
        <div class="hardware-label">
            <span>SAM4S SPS-2000 HARDWARE SIMULATOR v1.20</span>
            <span id="liveClock">00/00/0000 00:00:00</span>
        </div>

        <div class="lcd-screen">
            <div class="mode-lock-bar">
                <div class="mode-position active" id="lock-REG" onclick="selectMode('REG')">REG (Myynti)</div>
                <div class="mode-position" id="lock-REP" onclick="selectMode('REP')">REP (Raportit)</div>
                <div class="mode-position" id="lock-PRG" onclick="selectMode('PRG')">PRG (Ohjelmointi)</div>
                <div class="mode-position" id="lock-S" onclick="selectMode('S')">S (Järjestelmä)</div>
                <div class="screen-status-info" id="statusString">OPR: - | MODE: REG</div>
            </div>

            <div class="mode-indicator-overlay" id="modeOverlay">PRG MODE</div>

            <div class="main-interface">
                <div class="receipt-column">
                    <div class="receipt-header">TRANSACTION RECORD</div>
                    <div class="receipt-scroll" id="receiptContainer"></div>
                    <div class="operator-message-line" id="vfdMessage">SIGN ON REQUIRED</div>
                    <div class="vfd-numeric-display">
                        <span>TOTAL</span>
                        <span id="vfdTotal">0.00 €</span>
                    </div>
                </div>

                <div class="input-column">
                    <div class="touch-matrix" id="screenMatrix"></div>

                    <div class="fixed-keypad">
                        <button class="matrix-btn sam-numpad" onclick="hardwareNum('7')">7</button>
                        <button class="matrix-btn sam-numpad" onclick="hardwareNum('8')">8</button>
                        <button class="matrix-btn sam-numpad" onclick="hardwareNum('9')">9</button>
                        <button class="matrix-btn" onclick="hardwareFn('ERR_CORR')">ERR.CORR<br>(Korjaus)</button>
                        <button class="matrix-btn" style="background-color:#64748b; color:white;" onclick="changeKeylink(0)">MENU 1<br>(Juomat)</button>

                        <button class="matrix-btn sam-numpad" onclick="hardwareNum('4')">4</button>
                        <button class="matrix-btn sam-numpad" onclick="hardwareNum('5')">5</button>
                        <button class="matrix-btn sam-numpad" onclick="hardwareNum('6')">6</button>
                        <button class="matrix-btn" onclick="hardwareFn('VOID')">VOID ITEM<br>(Mitätöi)</button>
                        <button class="matrix-btn" style="background-color:#64748b; color:white;" onclick="changeKeylink(1)">MENU 2<br>(Ruoat)</button>

                        <button class="matrix-btn sam-numpad" onclick="hardwareNum('1')">1</button>
                        <button class="matrix-btn sam-numpad" onclick="hardwareNum('2')">2</button>
                        <button class="matrix-btn sam-numpad" onclick="hardwareNum('3')">3</button>
                        <button class="matrix-btn" onclick="hardwareFn('SUBTOTAL')">SUBTOTAL<br>(Välisumma)</button>
                        <button class="matrix-btn sam-cash" onclick="hardwareFn('CASH')">KÄTEINEN<br>CASH<br>TL</button>

                        <button class="matrix-btn sam-numpad" onclick="hardwareNum('0')">0</button>
                        <button class="matrix-btn sam-numpad" onclick="hardwareNum('00')">00</button>
                        <button class="matrix-btn sam-numpad" onclick="hardwareNum('.')">.</button>
                        <button class="matrix-btn sam-red" onclick="hardwareFn('CLEAR')">CLR</button>
                    </div>
                </div>
            </div>

            <div class="sam-dialog-overlay" id="samDialog">
                <div class="sam-dialog-box" id="dialogContent"></div>
            </div>

        </div>
    </div>

    <script>
        let currentMode = "REG";
        let pendingMode = null;
        let currentMenuIndex = 0; 
        let activeClerk = null;
        let numpadBuffer = "";
        let activeTransaction = [];

        let zCounters = { totalSales: 0, cashReceived: 0, receiptsCount: 0 };
        let clerksDatabase = [{ name: "KASSA PEKKA", pin: "1111" }];

        // Luodaan valmiiksi tyhjä 25-ruudun matriisi molemmille sivuille
        let matrixMemory = { 0: [], 1: [] };
        for(let i=0; i<25; i++) {
            matrixMemory[0].push({ type: "EMPTY" });
            matrixMemory[1].push({ type: "EMPTY" });
        }

        // Ladataan muutama esimerkkivalmis tuote pohjaksi
        matrixMemory[0][0] = { type: "PLU", name: "Hanaolut 0.5", price: 8.50, color: "sam-blue" };
        matrixMemory[0][1] = { type: "PLU", name: "Siideri 0.4", price: 9.00, color: "sam-blue" };
        matrixMemory[0][4] = { type: "CLERK_SIGN", name: "SIGN-ON", color: "sam-amber" };

        window.onload = function() {
            setInterval(() => {
                document.getElementById('liveClock').innerText = new Date().toLocaleDateString('fi-FI') + " " + new Date().toLocaleTimeString('fi-FI');
            }, 1000);
            renderTouchMatrix();
            updateStatusBar();
        };

        // --- KORJATTU LUOTETTAVA TILANVAIHTAJA ---
        function selectMode(targetMode) {
            if (targetMode === currentMode) return;
            
            if (targetMode === "REG") {
                executeModeChange("REG");
            } else {
                // Avataan suoraan lukituksen kyselyikkuna näytölle ohjekirjan mukaisesti!
                pendingMode = targetMode;
                openModePasswordDialog();
            }
        }

        function openModePasswordDialog() {
            const container = document.getElementById('dialogContent');
            container.innerHTML = `
                <div class="dialog-title">SAM4S SPS-2000 SECURITY LOCK</div>
                <div class="dialog-field">
                    <label>SYÖTÄ TILA-AVAIMEN SUOJAKOODI (PASSWORD):</label>
                    <input type="password" id="modePinInput" placeholder="Vihje: Oletuskoodi on 2000" autofocus>
                </div>
                <div class="dialog-buttons">
                    <button class="dialog-btn" style="background:#ef4444;color:white;" onclick="closeDialog()">PERUUTA</button>
                    <button class="dialog-btn" style="background:#10b981;color:white;" onclick="validateModePassword()">ENTER / OK</button>
                </div>
            `;
            document.getElementById('samDialog').style.display = "flex";
        }

        function validateModePassword() {
            let val = document.getElementById('modePinInput').value;
            if (val === "2000") {
                closeDialog();
                executeModeChange(pendingMode);
            } else {
                alert("VIRHEELLINEN LUKITUSKOODI! Oikea koodi on 2000");
            }
        }

        function executeModeChange(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-position').forEach(el => el.classList.remove('active'));
            document.getElementById('lock-' + mode).classList.add('active');

            const overlay = document.getElementById('modeOverlay');
            if (currentMode !== 'REG') {
                overlay.style.display = "block";
                overlay.innerText = currentMode + " MODE ACTIVE";
                overlay.style.backgroundColor = currentMode === 'PRG' ? '#dc2626' : (currentMode === 'S' ? '#7c3aed' : '#d97706');
            } else {
                overlay.style.display = "none";
            }

            document.getElementById('vfdMessage').innerText = "MODE: " + currentMode;
            document.getElementById('receiptContainer').innerHTML = '';
            
            if (currentMode === "REP") runRepDefault();

            updateStatusBar();
            renderTouchMatrix();
            updateTransactionDisplay();
        }

        function updateStatusBar() {
            let clerkName = activeClerk ? activeClerk.name : "-";
            document.getElementById('statusString').innerText = `OPR: ${clerkName} | MODE: ${currentMode}`;
        }

        // --- NÄYTTÖMATRIISIN PIIRTO ---
        function renderTouchMatrix() {
            const grid = document.getElementById('screenMatrix');
            grid.innerHTML = '';
            let sivu = matrixMemory[currentMenuIndex];

            sivu.forEach((cell, index) => {
                const btn = document.createElement('button');
                btn.className = "matrix-btn";

                if (currentMode === "REG") {
                    if (cell.type === "PLU") {
                        btn.className = `matrix-btn ${cell.color}`;
                        btn.innerHTML = `<span>${cell.name}</span><br><span>${cell.price.toFixed(2)} €</span>`;
                        btn.onclick = () => {
                            if (!activeClerk) { document.getElementById('vfdMessage').innerText = "SIGN ON REQUIRED"; return; }
                            activeTransaction.push({ name: cell.name, price: cell.price });
                            updateTransactionDisplay();
                        };
                    } else if (cell.type === "CLERK_SIGN") {
                        btn.className = "matrix-btn sam-amber";
                        btn.innerHTML = "OPERATOR<br>SIGN-ON";
                        btn.onclick = () => triggerSignOn();
                    } else {
                        btn.className = "matrix-btn sam-empty";
                        btn.innerText = "•";
                    }
                } 
                else if (currentMode === "PRG") {
                    btn.style.backgroundColor = cell.type === "PLU" ? "#93c5fd" : "#cbd5e1";
                    btn.style.border = "2px dashed #1e3a8a";
                    if (cell.type === "PLU") {
                        btn.innerHTML = `<span style="font-size:10px;color:#1e40af;">[PLU]</span><br><strong>${cell.name}</strong><br>${cell.price.toFixed(2)}€`;
                    } else {
                        btn.innerHTML = `<span style="color:#64748b;">TYHJÄ</span><br><span style="font-size:10px;">Luo tuote</span>`;
                    }
                    btn.onclick = () => openPrgDialog(index);
                }
                else if (currentMode === "S") {
                    btn.style.backgroundColor = "#e9d5ff";
                    btn.style.border = "2px dashed #6b21a8";
                    if (cell.type === "PLU") {
                        btn.innerHTML = `[PLU]<br><strong>${cell.name}</strong><br>Väri: ${cell.color}`;
                    } else if (cell.type === "CLERK_SIGN") {
                        btn.innerHTML = `[FUNKTIO]<br>SIGN-ON`;
                    } else {
                        btn.innerHTML = `TYHJÄ<br><span style="font-size:9px;">Muuta tyyppiä</span>`;
                    }
                    btn.onclick = () => openSDialog(index);
                }
                else if (currentMode === "REP") {
                    btn.className = "matrix-btn sam-empty";
                    if (index === 0) {
                        btn.className = "matrix-btn sam-amber"; btn.innerHTML = "LUKU<br>RAPORTTI (X1)";
                        btn.onclick = () => {
                            document.getElementById('receiptContainer').innerHTML = `<div style="font-weight:bold;text-align:center;">* FINANCIAL REPORT X1 *</div><p>Kuitteja: ${zCounters.receiptsCount}</p><p>Myynti: ${zCounters.totalSales.toFixed(2)} €</p>`;
                        };
                    } else if (index === 1) {
                        btn.className = "matrix-btn sam-red"; btn.innerHTML = "NOLLAUS<br>PÄÄTÖS (Z1)";
                        btn.onclick = () => {
                            document.getElementById('receiptContainer').innerHTML = `<div style="font-weight:bold;text-align:center;color:red;">* RESET REPORT Z1 *</div><p>Myynnit nollattu!</p><p>Kuitatut rahat talteen.</p>`;
                            zCounters = { totalSales: 0, cashReceived: 0, receiptsCount: 0 };
                        };
                    }
                }

                grid.appendChild(btn);
            });
        }

        // --- AITO KOSKETUSOHJELMOINTI (PRG DIALOGI) ---
        let selectedIndex = null;
        function openPrgDialog(index) {
            selectedIndex = index;
            let cell = matrixMemory[currentMenuIndex][index];
            const container = document.getElementById('dialogContent');
            container.innerHTML = `
                <div class="dialog-title">PRG-MODE: MÄÄRITÄ TUOTE NÄYTTÖRUUTUUN ${index+1}</div>
                <div class="dialog-field">
                    <label>TUOTTEEN NIMI (TEKSTI PAINIKKEESEEN):</label>
                    <input type="text" id="pName" value="${cell.type === 'PLU' ? cell.name : ''}" placeholder="Esim. Kahvi, Kokis..." autofocus>
                </div>
                <div class="dialog-field">
                    <label>HINTA (€):</label>
                    <input type="number" step="0.01" id="pPrice" value="${cell.type === 'PLU' ? cell.price : ''}" placeholder="0.00">
                </div>
                <div class="dialog-buttons">
                    <button class="dialog-btn" style="background:#64748b;color:white;" onclick="clearCell()">TYHJENNÄ RUUTU</button>
                    <button class="dialog-btn" style="background:#ef4444;color:white;" onclick="closeDialog()">PERUUTA</button>
                    <button class="dialog-btn" style="background:#10b981;color:white;" onclick="savePrgCell()">TALLENNA / OK</button>
                </div>
            `;
            document.getElementById('samDialog').style.display = "flex";
        }

        function savePrgCell() {
            let name = document.getElementById('pName').value.trim();
            let price = parseFloat(document.getElementById('pPrice').value);
            if(!name || isNaN(price)) { alert("Syötä nimi ja hinta!"); return; }

            let old = matrixMemory[currentMenuIndex][selectedIndex];
            matrixMemory[currentMenuIndex][selectedIndex] = {
                type: "PLU", name: name, price: price, color: old.type === 'PLU' ? old.color : 'sam-blue'
            };
            closeDialog(); renderTouchMatrix();
        }

        function clearCell() {
            matrixMemory[currentMenuIndex][selectedIndex] = { type: "EMPTY" };
            closeDialog(); renderTouchMatrix();
        }

        // --- S-MODE: PAINIKKEEN TYYPIN/VÄRIN VAIHTO ---
        function openSDialog(index) {
            selectedIndex = index;
            let cell = matrixMemory[currentMenuIndex][index];
            const container = document.getElementById('dialogContent');
            container.innerHTML = `
                <div class="dialog-title">S-MODE: PAINIKKEEN FUNKTIO (RUUTU ${index+1})</div>
                <div class="dialog-field">
                    <label>PAINIKKEEN TOIMINTOTYYPPI:</label>
                    <select id="sType">
                        <option value="EMPTY" ${cell.type==='EMPTY'?'selected':''}>TYHJÄ</option>
                        <option value="PLU" ${cell.type==='PLU'?'selected':''}>TUOTE (PLU)</option>
                        <option value="CLERK_SIGN" ${cell.type==='CLERK_SIGN'?'selected':''}>KIRJAUTUMISNÄPPÄIN</option>
                    </select>
                </div>
                <div class="dialog-field">
                    <label>PAINIKKEEN VÄRI (SAM4S PALETTI):</label>
                    <select id="sColor">
                        <option value="sam-blue">Sininen</option>
                        <option value="sam-green">Vihreä</option>
                        <option value="sam-amber">Oranssi</option>
                        <option value="sam-purple">Violetti</option>
                        <option value="sam-red">Punainen</option>
                    </select>
                </div>
                <div class="dialog-buttons">
                    <button class="dialog-btn" style="background:#ef4444;color:white;" onclick="closeDialog()">PERUUTA</button>
                    <button class="dialog-btn" style="background:#10b981;color:white;" onclick="saveSCell()">MÄÄRITÄ</button>
                </div>
            `;
            document.getElementById('samDialog').style.display = "flex";
        }

        function saveSCell() {
            let type = document.getElementById('sType').value;
            let color = document.getElementById('sColor').value;
            let old = matrixMemory[currentMenuIndex][selectedIndex];

            if(type === 'EMPTY') matrixMemory[currentMenuIndex][selectedIndex] = { type: "EMPTY" };
            else if(type === 'CLERK_SIGN') matrixMemory[currentMenuIndex][selectedIndex] = { type: "CLERK_SIGN", name: "SIGN-ON", color: "sam-amber" };
            else {
                matrixMemory[currentMenuIndex][selectedIndex] = {
                    type: "PLU", name: old.name || "UUSI TUOTE", price: old.price || 1.00, color: color
                };
            }
            closeDialog(); renderTouchMatrix();
        }

        // --- MYYJÄN SIGN ON DIALOGI ---
        function triggerSignOn() {
            const container = document.getElementById('dialogContent');
            container.innerHTML = `
                <div class="dialog-title">SIGN-ON OPERATOR</div>
                <div class="dialog-field">
                    <label>PIN-KOODI (Vihje: 1111):</label>
                    <input type="password" id="clerkPinInput" maxlength="4" autofocus>
                </div>
                <div class="dialog-buttons">
                    <button class="dialog-btn" onclick="closeDialog()">PERUUTA</button>
                    <button class="dialog-btn" style="background:#10b981;color:white;" onclick="validateClerk()">OK</button>
                </div>
            `;
            document.getElementById('samDialog').style.display = "flex";
        }

        function validateClerk() {
            let pin = document.getElementById('clerkPinInput').value;
            if(pin === "1111") {
                activeClerk = clerksDatabase[0];
                document.getElementById('vfdMessage').innerText = "READY";
                closeDialog(); updateStatusBar(); renderTouchMatrix();
            } else {
                alert("VÄÄRÄ PIN!");
            }
        }

        function closeDialog() { document.getElementById('samDialog').style.display = "none"; }
        function changeKeylink(idx) { currentMenuIndex = idx; renderTouchMatrix(); }

        function updateTransactionDisplay() {
            const c = document.getElementById('receiptContainer');
            c.innerHTML = ''; let total = 0;
            activeTransaction.forEach(i => {
                c.innerHTML += `<div class="bill-row"><span>${i.name}</span><span>${i.price.toFixed(2)} €</span></div>`;
                total += i.price;
            });
            document.getElementById('vfdTotal').innerText = total.toFixed(2) + " €";
        }

        function hardwareNum(val) { numpadBuffer += val; document.getElementById('vfdMessage').innerText = "INPUT: " + numpadBuffer; }
        function hardwareFn(act) {
            if(act === 'CLEAR') { numpadBuffer = ""; document.getElementById('vfdMessage').innerText = activeClerk ? "READY" : "SIGN ON REQ"; }
            if(act === 'CASH') {
                if(activeTransaction.length === 0) return;
                let tot = activeTransaction.reduce((s,i)=>s+i.price,0);
                zCounters.totalSales += tot; zCounters.receiptsCount++;
                activeTransaction = []; numpadBuffer = ""; updateTransactionDisplay();
                document.getElementById('vfdMessage').innerText = "KUITTI VALMIS / TASARAHALLA";
            }
        }
        function runRepDefault() {
            document.getElementById('receiptContainer').innerHTML = `<h3>REP SYSTEM READY</h3><p>Paina ruutua 1 tai 2 raporteille.</p>`;
        }
    </script>
</body>
</html>
