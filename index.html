<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>NASTA PRO - Navigaattori</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    
    <style>
        body { margin:0; padding:0; background:#111; }
        #map { height: 100vh; width: 100vw; }
        
        /* Navigaattorin tiedot näytön päällä */
        .navi-hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.85); color: white; padding: 20px;
            border-left: 10px solid #e67e22; border-radius: 5px;
            width: 300px;
        }
        .speed-limit { font-size: 3rem; color: #f1c40f; font-weight: bold; }
        .turn-instruction { font-size: 1.2rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="navi-hud">
        <div style="font-size:0.8rem; color:#aaa;">NOPEUSRAJOITUS</div>
        <div class="speed-limit" id="rajoitus">-- km/h</div>
        <div class="turn-instruction" id="ohje">Lasketaan reittiä...</div>
    </div>

    <div id="map"></div>

    <script>
        const map = L.map('map').setView([60.39, 25.66], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let routing = L.Routing.control({
            waypoints: [L.latLng(60.39, 25.66), L.latLng(60.40, 25.67)],
            router: L.Routing.osrmv1({ profile: 'car' })
        }).addTo(map);

        // Päivitetään ohjeet reitin perusteella
        routing.on('routesfound', function(e) {
            const step = e.routes[0].instructions[0];
            document.getElementById('ohje').innerText = step.text;
            
            // OSRM palauttaa 'maxspeed' tiedon, jos se on saatavilla reitityksessä
            if(step.extra && step.extra.maxspeed) {
                document.getElementById('rajoitus').innerText = step.extra.maxspeed + " km/h";
            } else {
                document.getElementById('rajoitus').innerText = "50 km/h"; // Oletus
            }
        });
    </script>
</body>
</html>
