<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>NASTA Pro - Toiminnallinen</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin:0; padding:0; height:100vh; width:100vw; overflow:hidden; background:#000; font-family: sans-serif; color: white; }
        #map { height: 100vh; width: 100vw; }
        
        .hud { position: absolute; z-index: 1000; }
        .top-left { top: 20px; left: 20px; }
        
        /* Napit ja paneelit */
        .btn { height: 60px; padding: 0 20px; font-weight: bold; cursor: pointer; background: #000; color: #fff; border: 2px solid #fff; font-size: 1.2rem; }
        
        .bottom-bar { 
            bottom: 0; left: 0; width: 100%; height: 100px; 
            background: rgba(0,0,0,0.95); border-top: 4px solid #fff; 
            display: flex; align-items: center; justify-content: space-around;
            padding: 0 20px; font-size: 1.5rem;
        }
        
        .val { color: #0f0; font-weight: bold; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="hud top-left">
        <button class="btn" onclick="avaaValikko()">NAVIGOINTI</button>
    </div>

    <div class="bottom-bar">
        <div>TIE: <span id="tie-nimi" class="val">-</span></div>
        <div>RAJOITUS: <span id="rajoitus" class="val">80</span></div>
        <div>VAUHTI: <span id="oma-nopeus" class="val">0</span> km/h</div>
    </div>

    <script>
        // 1. Kartan alustus
        const map = L.map('map', { zoomControl: false }).setView([60.392, 25.666], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 2. Valikon toiminto
        function avaaValikko() {
            alert("Valikko avattu: Tässä näkyisi kohdelista.");
        }

        // 3. GPS-seuranta
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(pos => {
                const speedKmh = Math.round(pos.coords.speed * 3.6 || 0);
                document.getElementById('oma-nopeus').innerText = speedKmh;
                
                // Päivitetään kartan keskiö sijaintiin
                map.setView([pos.coords.latitude, pos.coords.longitude], 16);
                
                // Simuloitu tien nimi
                document.getElementById('tie-nimi').innerText = "VT7";
            }, null, { enableHighAccuracy: true });
        }
    </script>
</body>
</html>
